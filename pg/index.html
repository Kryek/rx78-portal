<!DOCTYPE html>
<html>
<head>
  <title>PG Kits – RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  html, body {
    margin: 0;
    height: 100%;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow: hidden;
  }

  .app { position: relative; width: 100%; height: 100vh; overflow: hidden; }

  .bg-image {
    position: absolute; inset: 0;
    background-image: url('../images/rx78-bg.png');
    background-size: cover;
    background-position: top center;
    background-repeat: no-repeat;
    z-index: 0;
    transform: translateX(50%);
    transition: transform 0.7s ease;
  }

  .bg-image::after {
    content: "";
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.6);
  }

  .content { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; }

  /* HERO */
  .hero { padding: 60px 20px 10px 20px; flex-shrink:0; }
  @media (max-width:600px){ 
    .hero{ padding: 80px 10px 10px 10px; }
  }

  #pageTitle {
    font-size: 28px;
    margin: 0 0 16px 0;
    line-height: 1.2;
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
    transform: skew(20deg);
    display: inline-block;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #pageTitle span { transform: skew(-20deg); display: block; }

  @media (max-width:600px){
    #pageTitle { font-size: 22px; margin-bottom: 12px; }
  }

  #searchBarWrapper { margin: 0 0 8px 0; opacity:0; transition: opacity 0.6s ease; }
  #searchBar {
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 8px 10px;
    transform: skew(-20deg);
    font-size: 14px;
    color: white;
    outline: none;
    width: calc(66% - 20px);
  }
  #searchBar::placeholder { color: #ccc; }

  .menu {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 40px 20px;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 25px, black calc(100% - 60px), transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 0%, black 25px, black calc(100% - 60px), transparent 100%);
    scrollbar-color: white black;
    scrollbar-width: thin;
    transition: opacity 0.7s ease;
    opacity: 0;
  }

  .menu::-webkit-scrollbar { width: 8px; }
  .menu::-webkit-scrollbar-track { background: black; }
  .menu::-webkit-scrollbar-thumb { background: white; border-radius:4px; }
  .menu::-webkit-scrollbar-thumb:hover { background:#ccc; }

  .panel {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 20px 30px;
    transform: skew(-20deg) translateX(-100px);
    opacity: 0;
    margin-bottom: 20px;
    cursor: pointer;
    transition: background 0.2s;
    width: 50%;
    text-align: center;
    box-sizing: border-box;
  }

  .panel:hover { background: rgba(17,17,17,0.8); }

  .panel .text {
    transform: skew(20deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .line {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: clamp(14px, 2vw, 18px);
  }

  .line.variant { margin-top: 4px; font-weight: 400; }

  @media (max-width:600px){
    .panel { width: 50%; padding: 16px 20px; }
    .line { font-size: clamp(12px, 3vw, 16px); }
  }

  #homeBtn {
    display: block;
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 8px 12px;
    transform: skew(-20deg) translateX(-100px);
    cursor: pointer;
    width: 66px;
    text-align: center;
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 2;
    transition: background 0.2s, opacity 0.7s ease;
    opacity: 0;
  }

  #homeBtn span {
    display: block;
    transform: skew(20deg);
    text-align: center;
    font-size: 10px;
    letter-spacing: 1.2px;
  }

  #homeBtn:hover { background: rgba(17,17,17,0.8); }

  @keyframes flyIn { to { transform: skew(-20deg) translateX(0); opacity:1; } }
  </style>
</head>
<body>
<div class="app">
  <div class="bg-image" id="bgImage"></div>
  <div class="content">
    <div id="homeBtn"><span>HOME</span></div>
    <div class="hero">
      <div id="pageTitle"><span>PERFECT GRADE</span></div>
      <div id="searchBarWrapper">
        <input type="text" id="searchBar" placeholder="Search...">
      </div>
    </div>
    <div class="menu" id="kitList"></div>
  </div>
</div>

<script>
  const bg = document.getElementById('bgImage');
  const kitList = document.getElementById('kitList');
  const homeBtn = document.getElementById('homeBtn');
  const pageTitle = document.getElementById('pageTitle');
  const searchWrapper = document.getElementById('searchBarWrapper');
  const searchBar = document.getElementById('searchBar');
  let pgKits = [];

  fetch('../data/pg-kits.json')
    .then(res => res.json())
    .then(data => {
      pgKits = data.kits;
      displayKits(pgKits);
    })
    .catch(err => {
      console.error("Failed to load pg-kits.json", err);
      kitList.innerHTML = "<div style='color:red; padding:20px;'>Failed to load PG kits.</div>";
    });

  function displayKits(kits) {
    kitList.innerHTML = '';
    kits.forEach((kit, i) => {
      const panel = document.createElement('div');
      panel.classList.add('panel');
      panel.innerHTML = `
        <div class="text">
          <div class="line mold">${kit.mold}</div>
          <div class="line variant">&gt; ${kit.variant}</div>
        </div>`;
      panel.addEventListener('click', () => window.location.href = kit.page);
      kitList.appendChild(panel);
      setTimeout(() => { panel.style.animation = `flyIn 0.6s forwards ${i*0.1 + 0.3}s`; }, 50);
    });
    setTimeout(()=>{ 
      pageTitle.style.opacity = 1; 
      searchWrapper.style.opacity = 1;
      kitList.style.opacity = 1;
    }, 100);
  }

  searchBar.addEventListener('input', () => {
    const term = searchBar.value.toLowerCase();
    displayKits(pgKits.filter(k => 
      k.mold.toLowerCase().includes(term) || k.variant.toLowerCase().includes(term)
    ));
  });

  setTimeout(()=>{ homeBtn.style.animation = 'flyIn 0.6s forwards 0.2s'; }, 100);

  homeBtn.addEventListener('click', () => {
    kitList.style.opacity = 0;
    pageTitle.style.opacity = 0;
    searchWrapper.style.opacity = 0;
    homeBtn.style.opacity = 0;
    bg.style.transform = 'translateX(0%)';
    setTimeout(()=> window.location.href='../index.html', 700);
  });
</script>
</body>
</html>
