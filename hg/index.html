<!DOCTYPE html>
<html>
<head>
  <title>HG Kits – RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  html, body {
    margin: 0;
    height: 100%;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow: hidden;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  /* BACKGROUND */
  .bg-image {
    position: absolute;
    inset: 0;
    background-image: url('../images/rx78-bg.png');
    background-size: cover;
    background-position: top center;
    background-repeat: no-repeat;
    z-index: 0;
    transform: translateX(50%); /* half gundam position */
    transition: transform 0.7s ease;
  }

  .bg-image::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
  }

  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .hero { padding: 30px 20px; flex-shrink:0; }

  @media (max-width:600px){ .hero{ padding:15px 10px; } }

  .menu {
    flex: 1;
    overflow-y: auto;
    padding: 80px 20px 100px;

    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 60px, black calc(100% - 60px), transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 0%, black 60px, black calc(100% - 60px), transparent 100%);

    scrollbar-color: white black;
    scrollbar-width: thin;
  }

  .menu::-webkit-scrollbar { width: 8px; }
  .menu::-webkit-scrollbar-track { background: black; }
  .menu::-webkit-scrollbar-thumb { background: white; border-radius:4px; }
  .menu::-webkit-scrollbar-thumb:hover { background:#ccc; }

  @media (max-width:600px){ .menu { padding: 80px 20px 140px; } }

  /* KIT PANELS */
  .panel {
    position: relative;
    display: block;
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 22px 36px;
    transform: skew(-20deg) translateX(-100px);
    opacity: 0;
    margin-bottom: 25px;
    cursor: pointer;
    transition: background 0.2s;
    width: 50%; /* half screen width */
    text-align: left;
  }

  .panel:hover { background: rgba(17,17,17,0.8); }

  .panel span {
    display: block;
    transform: skew(20deg);
    text-align: left;
    font-size: 20px;
    letter-spacing: 1.5px;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
  }

  /* HOME BUTTON */
  #homeBtn {
    position: absolute;
    top: 20px;
    left: 20px;
    padding: 10px 16px;
    font-size: 16px;
    background: rgba(17,17,17,0.65);
    border: 2px solid white;
    cursor: pointer;
    z-index: 2;
    transition: background 0.2s;
  }

  #homeBtn:hover { background: rgba(17,17,17,0.8); }

  /* ANIMATION */
  @keyframes flyIn {
    to { transform: skew(-20deg) translateX(0); opacity:1; }
  }
  </style>
</head>
<body>
<div class="app">

  <div class="bg-image" id="bgImage"></div>

  <div class="content">

    <button id="homeBtn">HOME</button>

    <div class="hero"></div>

    <div class="menu" id="kitList">

      <!-- Example HG kits -->
      <div class="panel"><span>HG / Revive / Standard</span></div>
      <div class="panel"><span>HG / Revive / RX-78-3</span></div>
      <div class="panel"><span>HG / 1990 / Standard</span></div>
      <!-- Add more kits as needed -->

    </div>

  </div>

</div>

<script>
  const bg = document.getElementById('bgImage');
  const kits = document.querySelectorAll('#kitList .panel');

  // Fly-in stagger animation for kit panels
  kits.forEach((kit,i)=>{
    kit.style.animation = `flyIn 0.6s forwards ${i*0.1 + 0.3}s`;
  });

  // Home button click
  const homeBtn = document.getElementById('homeBtn');
  homeBtn.addEventListener('click', ()=>{
    // fade out all kit panels
    kits.forEach((kit,i)=>{
      kit.style.transition = 'opacity 0.5s, transform 0.5s';
      kit.style.opacity = 0;
      kit.style.transform = 'skew(-20deg) translateX(-100px)';
    });

    // fade out home button
    homeBtn.style.transition = 'opacity 0.5s';
    homeBtn.style.opacity = 0;

    // move background back to center
    bg.style.transform = 'translateX(0%)';

    // after animation complete, go to main index
    setTimeout(()=>{ window.location.href = '../index.html'; }, 600);
  });
</script>

</body>
</html>
