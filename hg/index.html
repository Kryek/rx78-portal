<!DOCTYPE html>
<html>
<head>
  <title>HG Kits – RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  html, body {
    margin: 0;
    height: 100%;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow: hidden;
  }

  .app { position: relative; width: 100%; height: 100vh; overflow: hidden; }

  .bg-image {
    position: absolute; inset: 0;
    background-image: url('../images/rx78-bg.png');
    background-size: cover;
    background-position: top center;
    background-repeat: no-repeat;
    z-index: 0;
    transform: translateX(50%);
    transition: transform 0.7s ease;
  }

  .bg-image::after {
    content: "";
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.6);
  }

  .content { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; }

  .hero { padding: 30px 20px; flex-shrink:0; }
  @media (max-width:600px){ .hero{ padding:15px 10px; } }

  /* PAGE TITLE (no container) */
  #pageTitle {
    font-size: 32px;
    margin: 0 20px 20px 20px;
    line-height: 1.2;
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
    transform: skew(20deg);
    display: inline-block;
  }
  #pageTitle span { transform: skew(-20deg); display: block; }

  /* SEARCH BAR */
  #searchBarWrapper { margin: 0 20px 20px 20px; }
  #searchBar {
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 12px 16px;
    transform: skew(-20deg);
    font-size: 18px;
    color: white;
    outline: none;
    width: calc(50% - 40px);
  }
  #searchBar::placeholder { color: #ccc; }

  .menu {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 60px, black calc(100% - 60px), transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 0%, black 60px, black calc(100% - 60px), transparent 100%);
    scrollbar-color: white black;
    scrollbar-width: thin;
    transition: opacity 0.7s ease;
    opacity: 1;
  }

  .menu::-webkit-scrollbar { width: 8px; }
  .menu::-webkit-scrollbar-track { background: black; }
  .menu::-webkit-scrollbar-thumb { background: white; border-radius:4px; }
  .menu::-webkit-scrollbar-thumb:hover { background:#ccc; }

  .panel {
    position: relative;
    display: block;
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 22px 36px;
    transform: skew(-20deg) translateX(-100px);
    opacity: 0;
    margin-bottom: 25px;
    cursor: pointer;
    transition: background 0.2s;
    width: 50%;
    text-align: left;
  }

  .panel:hover { background: rgba(17,17,17,0.8); }

  .panel span {
    display: block;
    transform: skew(20deg);
    text-align: left;
    font-size: 20px;
    letter-spacing: 1.5px;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
  }

  #homeBtn {
    display: block;
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 14px 26px;
    transform: skew(-20deg) translateX(-100px);
    cursor: pointer;
    width: 150px;
    text-align: center;
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 2;
    transition: background 0.2s, opacity 0.7s ease;
    opacity: 0;
  }

  #homeBtn span {
    display: block;
    transform: skew(20deg);
    text-align: center;
    font-size: 18px;
    letter-spacing: 2px;
  }

  #homeBtn:hover { background: rgba(17,17,17,0.8); }

  @keyframes flyIn { to { transform: skew(-20deg) translateX(0); opacity:1; } }

  </style>
</head>
<body>
<div class="app">

  <div class="bg-image" id="bgImage"></div>

  <div class="content">

    <div id="homeBtn"><span>HOME</span></div>

    <div class="hero">
      <!-- Page Title -->
      <div id="pageTitle"><span>RX-78 <br>&gt; HIGH GRADE</span></div>

      <!-- Search Bar -->
      <div id="searchBarWrapper">
        <input type="text" id="searchBar" placeholder="Search by mold or variant...">
      </div>
    </div>

    <div class="menu" id="kitList"></div>

  </div>

</div>

<script>
  const bg = document.getElementById('bgImage');
  const kitList = document.getElementById('kitList');
  const homeBtn = document.getElementById('homeBtn');
  const searchBar = document.getElementById('searchBar');
  let hgKits = [];

  // Load JSON file dynamically
  fetch('../data/kits.json')
    .then(res => res.json())
    .then(data => {
      hgKits = data.kits.filter(k => k.meta === "HG");
      displayKits(hgKits);
    })
    .catch(err => {
      console.error("Failed to load kits.json", err);
      kitList.innerHTML = "<div style='color:red; padding:20px;'>Failed to load HG kits.</div>";
    });

  function displayKits(kits) {
    kitList.innerHTML = '';
    kits.forEach((kit, i) => {
      const panel = document.createElement('div');
      panel.classList.add('panel');
      panel.innerHTML = `<span>${kit.mold} <br> &gt; ${kit.variant}</span>`;
      panel.addEventListener('click', () => window.location.href = kit.page);
      kitList.appendChild(panel);
      setTimeout(() => { panel.style.animation = `flyIn 0.6s forwards ${i*0.1 + 0.3}s`; }, 50);
    });
  }

  // Search filter
  searchBar.addEventListener('input', () => {
    const term = searchBar.value.toLowerCase();
    displayKits(hgKits.filter(k => 
      k.mold.toLowerCase().includes(term) || k.variant.toLowerCase().includes(term)
    ));
  });

  // HOME button animation
  setTimeout(()=>{ homeBtn.style.animation = 'flyIn 0.6s forwards 0.2s'; }, 100);

  homeBtn.addEventListener('click', () => {
    kitList.style.opacity = 0;
    homeBtn.style.opacity = 0;
    bg.style.transform = 'translateX(0%)';
    setTimeout(()=> window.location.href='../index.html', 700);
  });
</script>

</body>
</html>
