<!DOCTYPE html>
<html>
<head>
  <title>HG Kits</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    html, body {
      margin: 0;
      height: 100%;
      background: black;
      font-family: 'Orbitron', sans-serif;
      color: white;
      overflow: hidden;
    }

    .app { position: relative; width: 100%; height: 100%; }

    /* Same size/position as background moved right on home */
    .bg-half {
      position: absolute;
      top: 0;
      right: 0;
      width: 60%;
      height: 100%;
      background: url('../images/rx78-bg.png') top center no-repeat;
      background-size: cover;
      z-index: 0;
    }

    .list-container {
      position: absolute;
      top: 0; left: 0;
      width: 40%;
      height: 100%;
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      background: rgba(0,0,0,0.7);
      z-index: 1;
    }

    .panel {
      position: relative;
      background: rgba(17,17,17,0.65);
      border: 3px solid white;
      padding: 18px 30px;
      margin-bottom: 20px;
      transform: skew(-20deg) translateX(-50px);
      opacity: 0;
      cursor: pointer;
    }

    .panel span {
      display: block;
      transform: skew(20deg);
      font-size: 20px;
      letter-spacing: 1.5px;
      text-align: center;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }

    .panel::after {
      content: "///";
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%) skew(20deg);
    }

    @keyframes flyInLeft {
      to { transform: skew(-20deg) translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="bg-half"></div>
  <div class="list-container">
    <div class="panel"><span>Revive Standard</span></div>
    <div class="panel"><span>Full Armor</span></div>
    <div class="panel"><span>Other Variant</span></div>
  </div>
</div>

<script>
  const panels = document.querySelectorAll('.list-container .panel');
  panels.forEach((panel,i)=>{
    panel.style.animation = `flyInLeft 0.5s forwards ${i*0.1}s`;
  });
</script>
</body>
</html>
