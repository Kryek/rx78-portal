<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: #0a0a0a;
    color: white;
    overflow-x: hidden;
  }

  /* HERO BANNER FADE IN */
  .hero {
    text-align: center;
    padding: 40px 20px;
    opacity: 0;
    animation: fadeIn 1s forwards;
    animation-delay: 0.2s;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .hero h1 {
    margin: 0;
    font-size: 32px;
  }

  .hero p {
    margin: 5px 0 0;
    font-size: 16px;
  }

  /* BUTTONS FLY IN FROM LEFT */
  .menu {
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 15px;
    opacity: 0;
    transform: translateX(-100px);
    animation: slideIn 1s forwards;
    animation-delay: 1s;
  }

  @keyframes slideIn {
    to { opacity: 1; transform: translateX(0); }
  }

  /* Panel styles */
  .panel {
    position: relative;
    display: block;
    text-decoration: none;
    color: white;
    background: #111;
    border: 3px solid white;
    padding: 22px 36px;
    transform: skew(-20deg);
    overflow: visible;
    transition: 0.2s;
    cursor: pointer;
    margin: 0;
  }

  .panel span {
    display: block;
    transform: skew(20deg);
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    letter-spacing: 2px;
  }

  .panel::after {
    content: "///";
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%) skew(20deg);
    font-weight: bold;
    color: white;
    font-size: 18px;
    transition: transform 0.3s ease;
  }

  .panel:hover {
    background: #222;
    transform: skew(-20deg) translateX(6px);
  }

  /* Dropdown */
  .dropdown {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
    align-items: center;
  }

  .panel.active + .dropdown {
    max-height: 500px;
  }

  .dropdown .panel {
    background: #222;
    border: 3px solid white;
    padding: 22px 18px;
    margin: 5px 0;
    transform: skew(-20deg);
    width: 50%;
  }

  .dropdown .panel span {
    font-size: 20px;
  }

  .dropdown .panel:hover {
    background: #333;
    transform: skew(-20deg) translateX(4px);
  }

  /* FADE OUT FOR NAVIGATION */
  .fade-out {
    animation: fadeOut 1s forwards; /* slower fade out */
  }

  @keyframes fadeOut {
    to {
      opacity: 0;
      transform: translateY(-20px);
    }
  }

  </style>
</head>
<body>

  <!-- Hero banner -->
  <div class="hero">
    <h1>RX-78-2 GUNDAM</h1>
    <p>Prototype Close Quarters Combat Mobile Suit</p>
  </div>

  <!-- Navigation panels -->
  <div class="menu">
    <a class="panel" href="index.html"><span>HOME</span></a>
    <div class="panel" id="gradesPanel"><span>GRADES</span></div>
    <div class="dropdown">
      <a class="panel" href="hg/index.html"><span>HG</span></a>
      <a class="panel" href="rg/index.html"><span>RG</span></a>
      <a class="panel" href="mg/index.html"><span>MG</span></a>
    </div>
    <a class="panel" href="#"><span>EXPLORE</span></a>
    <a class="panel" href="#"><span>ABOUT</span></a>
  </div>

  <script>
    const gradesPanel = document.getElementById('gradesPanel');
    gradesPanel.addEventListener('click', () => {
      gradesPanel.classList.toggle('active');
    });

    // Fade out navigation before leaving page
    const links = document.querySelectorAll('.panel[href]');
    links.forEach(link => {
      link.addEventListener('click', function(e){
        e.preventDefault();
        document.querySelectorAll('.hero, .menu').forEach(el => {
          el.classList.add('fade-out');
        });
        const href = this.getAttribute('href');
        setTimeout(() => {
          window.location = href;
        }, 1000); // match 1s fade out
      });
    });
  </script>
</body>
</html>
