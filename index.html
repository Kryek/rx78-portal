<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: #0a0a0a;
    color: white;
  }

  .hero {
    text-align: center;
    padding: 40px 20px;
  }

  .hero h1 {
    margin: 0;
    font-size: 32px;
  }

  .hero p {
    margin: 5px 0 0;
    font-size: 16px;
  }

  .menu {
    display: flex;
    flex-direction: column;
    padding: 20px;
  }

  /* Main panel style */
  .panel {
    position: relative;
    display: block;
    text-decoration: none;
    color: white;
    background: #111;
    border: 3px solid white;
    padding: 22px 36px;
    transform: skew(-20deg);
    overflow: visible;
    transition: 0.2s;
    cursor: pointer;
    margin: 0;
  }

  .panel span {
    display: block;
    transform: skew(20deg);
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    letter-spacing: 2px;
  }

  .panel::after {
    content: "///";
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%) skew(20deg);
    font-weight: bold;
    color: white;
    font-size: 18px;
  }

  .panel:hover {
    background: #222;
    transform: skew(-20deg) translateX(6px);
  }

  /* Dropdown container */
  .dropdown {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
  }

  .panel.active + .dropdown {
    max-height: 500px; /* enough for 3 buttons */
  }

  /* Dropdown panels slightly shorter */
  .dropdown .panel {
    background: #222;
    border: 3px solid white;
    padding: 22px 28px; /* reduced horizontal padding */
    margin: 0;
    transform: skew(-20deg);
  }

  .dropdown .panel span {
    font-size: 20px;
  }

  .dropdown .panel:hover {
    background: #333;
    transform: skew(-20deg) translateX(4px);
  }

  </style>
</head>
<body>

  <!-- Hero banner -->
  <div class="hero">
    <h1>RX-78-2 GUNDAM</h1>
    <p>Prototype Close Quarters Combat Mobile Suit</p>
  </div>

  <!-- Navigation panels -->
  <div class="menu">
    <a class="panel" href="index.html"><span>HOME</span></a>

    <!-- Grades panel -->
    <div class="panel" id="gradesPanel"><span>GRADES</span></div>
    <div class="dropdown">
      <a class="panel" href="hg/index.html"><span>HG</span></a>
      <a class="panel" href="rg/index.html"><span>RG</span></a>
      <a class="panel" href="mg/index.html"><span>MG</span></a>
    </div>

    <a class="panel" href="#"><span>EXPLORE</span></a>
    <a class="panel" href="#"><span>ABOUT</span></a>
  </div>

  <script>
    const gradesPanel = document.getElementById('gradesPanel');
    gradesPanel.addEventListener('click', () => {
      gradesPanel.classList.toggle('active');
    });
  </script>
</body>
</html>
