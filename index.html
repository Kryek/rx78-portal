<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: #0a0a0a;
    color: white;
  }

  .menu {
    display: flex;
    flex-direction: column;
    padding: 20px;
  }

  /* Panel wrapper: prevents clipping */
  .panel-wrapper {
    margin: 0;
    overflow: visible; /* allow skew to render outside without cutting */
  }

  /* Main panel style */
  .panel {
    position: relative;
    display: block;
    text-decoration: none;
    color: white;
    background: #111;
    border: 3px solid white;
    cursor: pointer;
    overflow: visible;
    transition: 0.2s;
  }

  .panel-inner {
    transform: skew(-20deg);
    padding: 20px 30px;
    position: relative;
  }

  .panel-inner span {
    display: block;
    transform: skew(20deg);
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    letter-spacing: 2px;
  }

  .panel-inner::after {
    content: "///";
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%) skew(20deg);
    font-weight: bold;
    color: white;
    font-size: 18px;
  }

  .panel-inner:hover {
    background: #222;
    transform: skew(-20deg) translateX(6px);
  }

  /* Dropdown wrapper with animation */
  .dropdown {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
  }

  /* Show dropdown when active */
  .panel-wrapper.active + .dropdown {
    max-height: 500px;
  }

  /* Dropdown panels */
  .dropdown .panel-wrapper {
    margin: 0;
  }

  .dropdown .panel-inner {
    background: #222;
    border: 3px solid white;
    padding: 20px 30px;
    font-size: 20px;
  }

  .dropdown .panel-inner span {
    font-weight: bold;
  }

  .dropdown .panel-inner::after {
    content: "///";
  }

  .dropdown .panel-inner:hover {
    background: #333;
    transform: skew(-20deg) translateX(4px);
  }

  </style>
</head>
<body>

  <div class="menu">
    <div class="panel-wrapper">
      <div class="panel-inner"><span>HOME</span></div>
    </div>

    <!-- Grades panel -->
    <div class="panel-wrapper" id="gradesPanel">
      <div class="panel-inner"><span>GRADES</span></div>
    </div>
    <div class="dropdown">
      <div class="panel-wrapper">
        <div class="panel-inner"><span>HG</span></div>
      </div>
      <div class="panel-wrapper">
        <div class="panel-inner"><span>RG</span></div>
      </div>
      <div class="panel-wrapper">
        <div class="panel-inner"><span>MG</span></div>
      </div>
    </div>

    <div class="panel-wrapper">
      <div class="panel-inner"><span>EXPLORE</span></div>
    </div>
    <div class="panel-wrapper">
      <div class="panel-inner"><span>ABOUT</span></div>
    </div>
  </div>

  <script>
    const gradesPanel = document.getElementById('gradesPanel');
    gradesPanel.addEventListener('click', () => {
      gradesPanel.classList.toggle('active');
    });
  </script>
</body>
</html>
