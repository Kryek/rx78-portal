<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: #0a0a0a;
    color: white;
    overflow-x: hidden;
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 40px 20px;
    opacity: 0;
    animation: fadeIn 1s forwards;
    animation-delay: 0.2s;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .hero h1 { margin: 0; font-size: 32px; }
  .hero p { margin: 5px 0 0; font-size: 16px; }

  /* MENU */
  .menu {
    display: flex;
    flex-direction: column;
    padding: 20px;
  }

  .panel {
    position: relative;
    display: block;
    text-decoration: none;
    color: white;
    background: #111;
    border: 3px solid white;
    padding: 22px 36px;
    transform: skew(-20deg) translateX(-100px);
    opacity: 0;
    transition: 0.2s;
    cursor: pointer;
    margin-bottom: 25px;
  }

  .panel:last-child {
    margin-bottom: 0;
  }

  .panel span {
    display: block;
    transform: skew(20deg);
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    letter-spacing: 2px;
  }

  .panel::after {
    content: "///";
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%) skew(20deg);
    font-size: 18px;
  }

  .panel:hover {
    background: #222;
    transform: skew(-20deg) translateX(6px);
  }

  /* DROPDOWN */
  .dropdown {
    display: flex;
    flex-direction: column;
    align-items: center;

    max-height: 0;
    overflow: hidden;

    transition: max-height 0.4s ease;
    margin-bottom: 0;
  }

  .dropdown.open {
    margin-bottom: 25px;
  }

  .dropdown .panel {
    width: 75%; /* ✅ FIXED */
    margin: 8px 0;
    padding: 18px 45px 18px 25px; /* ✅ extra right padding for /// */

    background: #222;
    transform: skew(-20deg) translateX(-50px);
    opacity: 0;
  }

  .dropdown .panel span {
    font-size: 20px;
  }

  .dropdown .panel:hover {
    background: #333;
    transform: skew(-20deg) translateX(4px);
  }

  /* ANIMATIONS */
  @keyframes flyIn {
    to {
      transform: skew(-20deg) translateX(0);
      opacity: 1;
    }
  }

  @keyframes flyOut {
    to {
      transform: skew(-20deg) translateX(-50px);
      opacity: 0;
    }
  }

  @keyframes fadeOut {
    to {
      opacity: 0;
      transform: translateY(-20px);
    }
  }

  .fade-out {
    animation: fadeOut 1s forwards;
  }

  </style>
</head>
<body>

  <!-- HERO -->
  <div class="hero">
    <h1>RX-78-2 GUNDAM</h1>
    <p>Prototype Close Quarters Combat Mobile Suit</p>
  </div>

  <!-- MENU -->
  <div class="menu">

    <!-- SCALE -->
    <div class="panel" id="scalePanel"><span>SCALE</span></div>
    <div class="dropdown" id="scaleDropdown">
      <a class="panel" href="#"><span>1/144</span></a>
      <a class="panel" href="#"><span>1/100</span></a>
    </div>

    <!-- GRADES -->
    <div class="panel" id="gradesPanel"><span>GRADES</span></div>
    <div class="dropdown" id="gradesDropdown">
      <a class="panel" href="hg/index.html"><span>HG</span></a>
      <a class="panel" href="#"><span>RG</span></a>
      <a class="panel" href="#"><span>MG</span></a>
      <a class="panel" href="#"><span>PG</span></a>
      <a class="panel" href="#"><span>MEGASIZE</span></a>
    </div>

    <a class="panel" href="#"><span>EXPLORE</span></a>
    <a class="panel" href="#"><span>ABOUT</span></a>

  </div>

  <script>
    // MAIN BUTTON CASCADE
    const mainButtons = document.querySelectorAll('.menu > .panel');
    mainButtons.forEach((btn, i) => {
      btn.style.animation = `flyIn 0.7s forwards ${i * 0.15 + 1}s`;
    });

    function setupDropdown(triggerId, dropdownId) {
      const trigger = document.getElementById(triggerId);
      const dropdown = document.getElementById(dropdownId);
      const items = dropdown.querySelectorAll('.panel');

      let open = false;

      trigger.addEventListener('click', () => {
        open = !open;

        if (open) {
          dropdown.classList.add('open');
          dropdown.style.maxHeight = "500px";

          items.forEach((item, i) => {
            item.style.animation = '';
            setTimeout(() => {
              item.style.animation = `flyIn 0.5s forwards ${i * 0.1}s`;
            }, 0);
          });

        } else {
          dropdown.style.maxHeight = "0";

          items.forEach((item, i) => {
            item.style.animation = '';
            setTimeout(() => {
              item.style.animation = `flyOut 0.3s forwards ${i * 0.05}s`;
            }, 0);
          });

          dropdown.classList.remove('open');
        }
      });
    }

    setupDropdown('scalePanel', 'scaleDropdown');
    setupDropdown('gradesPanel', 'gradesDropdown');

    // FADE OUT NAVIGATION
    const links = document.querySelectorAll('.panel[href]');
    links.forEach(link => {
      link.addEventListener('click', function(e){
        e.preventDefault();
        const href = this.getAttribute('href');

        document.querySelectorAll('.hero, .menu, .panel').forEach(el => {
          el.classList.add('fade-out');
        });

        setTimeout(() => {
          window.location = href;
        }, 1000);
      });
    });
  </script>

</body>
</html>
