<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  html, body {
    margin: 0;
    height: 100%;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow-x: hidden;
    overflow-y: hidden;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  /* BACKGROUND */
  .bg-image {
    position: absolute;
    inset: 0;
    background-image: url('images/rx78-bg.png');
    background-size: cover;
    background-position: top center;
    z-index: 0;
    transition: transform 0.8s ease;
  }

  .bg-image::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
  }

  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .menu {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .scroll-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 50px;

    scrollbar-color: white black;
    scrollbar-width: thin;
  }

  .scroll-container::-webkit-scrollbar { width: 8px; }
  .scroll-container::-webkit-scrollbar-track { background: black; }
  .scroll-container::-webkit-scrollbar-thumb { background: white; border-radius:4px; }

  /* MAIN BUTTONS */
  .panel {
    position: relative;
    width: 75vw;
    max-width: 500px;
    margin-bottom: 25px;

    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 22px 36px;

    transform: skew(-20deg) translateX(-100px);
    opacity: 0;

    cursor: pointer;
    transition: background 0.2s;
  }

  .panel:hover {
    background: rgba(17,17,17,0.8);
  }

  .panel span {
    display: block;
    transform: skew(20deg);
    text-align: center;
    font-size: 22px;
  }

  /* /// indicator (MAIN ONLY) */
  .menu > .scroll-container > .panel::after,
  #scalePanel::after,
  #gradesPanel::after {
    content: "///";
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%) skew(20deg) rotate(0deg);
    transition: transform 0.3s ease;
  }

  .panel.active::after {
    transform: translateY(-50%) skew(20deg) rotate(90deg);
  }

  /* DROPDOWN */
  .dropdown {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease;
  }

  .dropdown.open {
    margin-bottom: 30px;
  }

  /* 🔥 DESKTOP DROPDOWN (RECTANGLE) */
  .dropdown .panel {
    width: 50vw;
    max-width: 300px;
    margin: 8px 0;

    transform: translateX(-50px); /* no skew */
    opacity: 0;
  }

  .dropdown .panel span {
    transform: none;
    font-size: 18px;
  }

  .dropdown .panel::after {
    content: none;
  }

  /* MOBILE FIX */
  @media (max-width: 600px) {

    .panel {
      width: 80vw;
      max-width: 80vw;
    }

    .dropdown .panel {
      width: 80vw;
      max-width: 80vw;

      /* 🔥 FORCE RECTANGLE */
      transform: translateX(0) !important;
      animation: none !important;
      opacity: 1;
    }

    .dropdown .panel span {
      transform: none !important;
      font-size: 15px;
    }
  }

  @keyframes flyInMain {
    to { transform: skew(-20deg) translateX(0); opacity:1; }
  }

  @keyframes flyInDropdown {
    to { transform: translateX(0); opacity:1; }
  }

  @keyframes fadeOut {
    to { transform: translateX(-100px); opacity:0; }
  }

  </style>
</head>
<body>

<div class="app">

  <div class="bg-image" id="bgImage"></div>

  <div class="content">
    <div class="menu">
      <div class="scroll-container">

        <!-- SCALE -->
        <div class="panel" id="scalePanel"><span>SCALE</span></div>
        <div class="dropdown" id="scaleDropdown">
          <div class="panel"><span>1/144</span></div>
          <div class="panel"><span>1/100</span></div>
          <div class="panel"><span>MISC</span></div>
        </div>

        <!-- GRADES -->
        <div class="panel" id="gradesPanel"><span>GRADES</span></div>
        <div class="dropdown" id="gradesDropdown">
          <div class="panel"><span>SD</span></div>
          <div class="panel" data-link="hg/index.html"><span>HG</span></div>
          <div class="panel"><span>RG</span></div>
          <div class="panel"><span>MG</span></div>
          <div class="panel"><span>PG</span></div>
          <div class="panel"><span>MEGASIZE</span></div>
        </div>

        <div class="panel"><span>EXPLORE</span></div>
        <div class="panel"><span>ABOUT</span></div>

      </div>
    </div>
  </div>

</div>

<script>
const bgImage = document.getElementById('bgImage');
const mainButtons = document.querySelectorAll('#scalePanel, #gradesPanel, .scroll-container > .panel:not([id])');

/* MAIN ANIMATION */
mainButtons.forEach((btn,i)=>{
  btn.style.animation=`flyInMain 0.7s forwards ${i*0.15+0.5}s`;
});

/* DROPDOWN */
function setupDropdown(triggerId, dropdownId){
  const trigger = document.getElementById(triggerId);
  const dropdown = document.getElementById(dropdownId);
  const items = dropdown.querySelectorAll('.panel');
  let open = false;

  trigger.addEventListener('click', ()=>{
    open = !open;
    trigger.classList.toggle('active');

    if(open){
      dropdown.classList.add('open');
      dropdown.style.maxHeight = dropdown.scrollHeight + "px";

      items.forEach((item,i)=>{
        item.style.animation=`flyInDropdown 0.3s forwards ${i*0.08}s`;
      });

    } else {
      dropdown.style.maxHeight = "0";
      dropdown.classList.remove('open');
    }
  });
}

setupDropdown('scalePanel','scaleDropdown');
setupDropdown('gradesPanel','gradesDropdown');

/* NAVIGATION FIX */
document.querySelectorAll('[data-link]').forEach(item=>{
  item.addEventListener('click',()=>{

    const allPanels = document.querySelectorAll('.panel');

    allPanels.forEach((btn,i)=>{
      btn.style.animation=`fadeOut 0.4s forwards ${i*0.03}s`;
    });

    bgImage.style.transform='translateX(50%)';

    const link=item.getAttribute('data-link');
    if(link){
      setTimeout(()=>{ window.location.href=link; },500);
    }
  });
});
</script>

</body>
</html>
