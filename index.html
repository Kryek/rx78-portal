<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  html, body {
    margin: 0;
    height: 100%;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow: hidden;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  /* BACKGROUND */
  .bg-image {
    position: absolute;
    inset: 0;
    background-image: url('images/rx78-bg.png');
    background-size: cover;
    background-position: top center;
    background-repeat: no-repeat;
    z-index: 0;
    transition: transform 0.8s ease;
  }

  .bg-image::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
  }

  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end; /* anchor buttons near bottom */
  }

  /* MENU */
  .menu {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px; /* space from bottom */
    overflow: visible; /* allow dropdowns to expand upward */
  }

  /* PANELS */
  .panel {
    position: relative;
    display: block;
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 22px 36px;
    transform: skew(-20deg) translateX(-100px);
    opacity: 0;
    margin-bottom: 15px;
    cursor: pointer;
    transition: background 0.2s;
    width: 200px;
    text-align: center;
  }

  .panel:hover { background: rgba(17,17,17,0.8); }

  .panel span {
    display: block;
    transform: skew(20deg);
    text-align: center;
    font-size: 24px;
    letter-spacing: 2px;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
  }

  /* /// indicator */
  .panel::after {
    content: "///";
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%) skew(20deg) rotate(0deg);
    transition: transform 0.3s ease;
  }

  .panel.active::after {
    transform: translateY(-50%) skew(20deg) rotate(90deg);
  }

  /* DROPDOWN */
  .dropdown {
    display: flex;
    flex-direction: column-reverse; /* expand upward */
    align-items: center;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease;
    margin-bottom: 0;
  }

  .dropdown.open {
    margin-bottom: 15px;
  }

  .dropdown .panel {
    width: 180px;
    margin: 8px 0;
    background: rgba(17,17,17,0.55);
    transform: skew(-20deg) translateX(-50px);
    opacity: 0;
  }

  /* ANIMATION */
  @keyframes flyIn {
    to { transform: skew(-20deg) translateX(0); opacity:1; }
  }

  @keyframes fadeOut {
    to { transform: skew(-20deg) translateX(-100px); opacity:0; }
  }

  @media (max-width: 600px) {
    .content { justify-content: flex-start; } /* top alignment on mobile */
    .panel { width: 90%; margin-bottom: 12px; }
    .dropdown .panel { width: 80%; }
  }

  </style>
</head>
<body>

<div class="app">
  <div class="bg-image" id="bgImage"></div>
  <div class="content">
    <div class="menu">
      <!-- SCALE -->
      <div class="panel" id="scalePanel"><span>SCALE</span></div>
      <div class="dropdown" id="scaleDropdown">
        <div class="panel" data-link="#"><span>1/144</span></div>
        <div class="panel" data-link="#"><span>1/100</span></div>
        <div class="panel" data-link="#"><span>MISC</span></div>
      </div>

      <!-- GRADES -->
      <div class="panel" id="gradesPanel"><span>GRADES</span></div>
      <div class="dropdown" id="gradesDropdown">
        <div class="panel" data-link="#"><span>SD</span></div>
        <div class="panel" data-link="hg/index.html"><span>HG</span></div>
        <div class="panel" data-link="#"><span>RG</span></div>
        <div class="panel" data-link="#"><span>MG</span></div>
        <div class="panel" data-link="#"><span>PG</span></div>
        <div class="panel" data-link="#"><span>MEGASIZE</span></div>
      </div>

      <div class="panel" data-link="#"><span>EXPLORE</span></div>
      <div class="panel" data-link="#"><span>ABOUT</span></div>
    </div>
  </div>
</div>

<script>
const bgImage = document.getElementById('bgImage');
const mainButtons = document.querySelectorAll('.menu > .panel');
mainButtons.forEach((btn,i)=>{
  btn.style.animation = `flyIn 0.7s forwards ${i*0.15+0.5}s`;
});

// Dropdown toggle
function setupDropdown(triggerId, dropdownId){
  const trigger=document.getElementById(triggerId);
  const dropdown=document.getElementById(dropdownId);
  const items=dropdown.querySelectorAll('.panel');
  let open=false;

  trigger.addEventListener('click',()=>{
    open=!open;
    trigger.classList.toggle('active');

    if(open){
      dropdown.classList.add('open');
      dropdown.style.maxHeight=dropdown.scrollHeight+"px";
      items.forEach((item,i)=>{
        item.style.animation='';
        setTimeout(()=>{item.style.animation=`flyIn 0.4s forwards ${i*0.1}s`;},0);
      });
    } else {
      dropdown.style.maxHeight="0";
      dropdown.classList.remove('open');
      items.forEach(item=>{
        item.style.animation='none';
        item.style.opacity='0';
        item.style.transform='skew(-20deg) translateX(-50px)';
      });
    }
  });
}

setupDropdown('scalePanel','scaleDropdown');
setupDropdown('gradesPanel','gradesDropdown');

// Navigation: fadeout and slide background
document.querySelectorAll('.panel[data-link]').forEach(item=>{
  item.addEventListener('click',()=>{
    // fadeout main buttons
    mainButtons.forEach((btn,i)=>{ btn.style.animation=`fadeOut 0.5s forwards ${i*0.05}s`; });

    // fadeout all open dropdowns
    document.querySelectorAll('.dropdown.open .panel').forEach((d,i)=>{
      d.style.animation=`fadeOut 0.5s forwards ${i*0.05}s`;
    });

    // slide background same for Grades & Scale
    bgImage.style.transform='translateX(50%)';

    const link=item.getAttribute('data-link');
    if(link && link!=='#'){ setTimeout(()=>{ window.location.href=link; },600); }
  });
});
</script>

</body>
</html>
