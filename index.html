<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  html, body {
    margin: 0;
    height: 100%;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow-x: hidden;
    overflow-y: hidden;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow-x: visible;
  }

  .bg-image {
    position: absolute;
    inset: 0;
    background-image: url('images/rx78-bg.png');
    background-size: cover;
    background-position: top center;
    z-index: 0;
    transition: transform 0.8s ease;
  }

  .bg-image::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
  }

  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .menu {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .scroll-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: visible;
    scrollbar-color: white black;
    scrollbar-width: thin;
    padding-bottom: 50px;
  }

  .scroll-container::-webkit-scrollbar { width: 8px; }
  .scroll-container::-webkit-scrollbar-track { background: black; }
  .scroll-container::-webkit-scrollbar-thumb { background: white; border-radius:4px; }

  .button-container {
    display: flex;
    flex-direction: column;
    margin-top: auto;
    align-items: center;
  }

  /* MAIN BUTTONS (UNCHANGED) */
  .button-container > .panel {
    width: 75vw;
    max-width: 90%;
    margin-bottom: 25px;
  }

  .panel {
    position: relative;
    display: block;
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 22px 36px;
    transform: skew(-20deg) translateX(-100px);
    opacity: 0;
    cursor: pointer;
    box-sizing: border-box;
    transition: background 0.2s;
    z-index: 1;
  }

  .panel:hover { background: rgba(17,17,17,0.8); }

  .panel span {
    display: block;
    transform: skew(20deg);
    text-align: center;
    font-size: 24px;
  }

  /* /// ONLY FOR MAIN BUTTONS */
  .button-container > .panel::after {
    content: "///";
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%) skew(20deg) rotate(0deg);
    transition: transform 0.3s ease;
  }

  .button-container > .panel.active::after {
    transform: translateY(-50%) skew(20deg) rotate(90deg);
  }

  /* DROPDOWN */
  .dropdown {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease;
  }

  .dropdown.open {
    margin-bottom: 35px;
    z-index: 20;
  }

  /* 🔥 DROPDOWN BUTTONS → RECTANGLES */
  .dropdown .panel {
    width: 37.5vw;
    max-width: 50%;
    margin: 8px 0;
    background: rgba(17,17,17,0.55);

    transform: translateX(-50px); /* 👈 NO skew */
    opacity: 0;
  }

  .dropdown .panel span {
    transform: none; /* 👈 remove counter-skew */
    font-size: 20px;
  }

  /* REMOVE /// FROM DROPDOWN */
  .dropdown .panel::after {
    content: none;
  }

  /* MOBILE */
  @media (max-width: 600px) {

    .panel {
      width: 80vw;
      max-width: 80vw;
    }

    .dropdown .panel {
      width: 70vw;
      max-width: 70vw;
    }

    .dropdown .panel span {
      font-size: 15px;
      letter-spacing: 1px;
    }
  }

  @keyframes flyIn {
    to { transform: skew(-20deg) translateX(0); opacity:1; }
  }

  @keyframes fadeOut {
    to { transform: skew(-20deg) translateX(-100px); opacity:0; }
  }

  </style>
</head>
<body>

<div class="app">
  <div class="bg-image" id="bgImage"></div>

  <div class="content">
    <div class="menu">
      <div class="scroll-container">
        <div class="button-container">

          <!-- SCALE -->
          <div class="panel" id="scalePanel"><span>SCALE</span></div>
          <div class="dropdown" id="scaleDropdown">
            <div class="panel"><span>1/144</span></div>
            <div class="panel"><span>1/100</span></div>
            <div class="panel"><span>MISC</span></div>
          </div>

          <!-- GRADES -->
          <div class="panel" id="gradesPanel"><span>GRADES</span></div>
          <div class="dropdown" id="gradesDropdown">
            <div class="panel"><span>SD</span></div>
            <div class="panel" data-link="hg/index.html"><span>HG</span></div>
            <div class="panel"><span>RG</span></div>
            <div class="panel"><span>MG</span></div>
            <div class="panel"><span>PG</span></div>
            <div class="panel"><span>MEGASIZE</span></div>
          </div>

          <div class="panel"><span>EXPLORE</span></div>
          <div class="panel"><span>ABOUT</span></div>

        </div>
      </div>
    </div>
  </div>
</div>

<script>
const bgImage = document.getElementById('bgImage');
const mainButtons = document.querySelectorAll('.button-container > .panel');

/* fly in */
mainButtons.forEach((btn,i)=>{
  btn.style.animation=`flyIn 0.7s forwards ${i*0.15+0.5}s`;
});

/* dropdown logic */
function setupDropdown(triggerId, dropdownId){
  const trigger=document.getElementById(triggerId);
  const dropdown=document.getElementById(dropdownId);
  const items=dropdown.querySelectorAll('.panel');
  let open=false;

  trigger.addEventListener('click',()=>{
    open=!open;

    trigger.classList.toggle('active');

    if(open){
      dropdown.classList.add('open');
      dropdown.style.maxHeight=dropdown.scrollHeight+"px";

      items.forEach((item,i)=>{
        item.style.animation=`flyIn 0.4s forwards ${i*0.1}s`;
      });

    } else {
      dropdown.style.maxHeight="0";
      dropdown.classList.remove('open');

      items.forEach(item=>{
        item.style.opacity='0';
      });
    }
  });
}

setupDropdown('scalePanel','scaleDropdown');
setupDropdown('gradesPanel','gradesDropdown');

/* navigation */
document.querySelectorAll('[data-link]').forEach(item=>{
  item.addEventListener('click',()=>{
    mainButtons.forEach((btn,i)=>{
      btn.style.animation=`fadeOut 0.5s forwards ${i*0.05}s`;
    });

    document.querySelectorAll('.dropdown.open .panel').forEach((d,i)=>{
      d.style.animation=`fadeOut 0.5s forwards ${i*0.05}s`;
    });

    bgImage.style.transform='translateX(50%)';

    const link=item.getAttribute('data-link');
    if(link){
      setTimeout(()=>{ window.location.href=link; },600);
    }
  });
});
</script>

</body>
</html>
