<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: #0a0a0a;
    color: white;
  }

  .menu {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 20px;
  }

  .panel {
    position: relative;
    display: block;
    text-decoration: none;
    color: white;

    /* parallelogram shape */
    transform: skew(-20deg);

    /* panel look */
    background: #111;
    border: 3px solid white;

    padding: 20px 30px;
    overflow: hidden;

    transition: 0.2s;
  }

  /* inner frame line */
  .panel::before {
    content: "";
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(255,255,255,0.4);
    pointer-events: none;
  }

  /* right-side stripes */
  .panel::after {
    content: "";
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%) skew(20deg);

    width: 20px;
    height: 20px;

    background: repeating-linear-gradient(
      45deg,
      white,
      white 3px,
      transparent 3px,
      transparent 6px
    );

    opacity: 0.7;
  }

  .panel span {
    display: block;
    transform: skew(20deg); /* fix text */
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    letter-spacing: 2px;
  }

  .panel:hover {
    background: #222;
    transform: skew(-20deg) translateX(6px);
  }
</style>
</head>
<body>

  <!-- Hero banner -->
  <div class="hero">
    <h1>RX-78-2 GUNDAM</h1>
    <p>Prototype Close Quarters Combat Mobile Suit</p>
  </div>

  <!-- Navigation panels -->
  <div class="menu">
  <a class="panel" href="index.html"><span>HOME</span></a>
  <a class="panel" href="hg/index.html"><span>GRADES</span></a>
  <a class="panel" href="#"><span>EXPLORE</span></a>
  <a class="panel" href="#"><span>ABOUT</span></a>
</div>
</body>
</html>
