<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: #0a0a0a;
    color: white;
  }

  .menu {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 20px;
  }

  .panel {
    display: block;
    text-decoration: none;
    color: white;

    /* shape */
    transform: skew(-20deg);
    border: 3px solid white;
    background: #111;

    /* spacing */
    padding: 20px 30px;

    transition: 0.2s;
  }

  .panel span {
    display: block;
    transform: skew(20deg); /* fix text distortion */
    font-size: 24px;
    font-weight: bold;
    text-align: center;
  }

  .panel:hover {
    background: #222;
    transform: skew(-20deg) translateX(5px);
  }
</style>
</head>
<body>

  <!-- Hero banner -->
  <div class="hero">
    <h1>RX-78-2 GUNDAM</h1>
    <p>Prototype Close Quarters Combat Mobile Suit</p>
  </div>

  <!-- Navigation panels -->
  <div class="menu">
  <a class="panel" href="index.html"><span>HOME</span></a>
  <a class="panel" href="hg/index.html"><span>GRADES</span></a>
  <a class="panel" href="#"><span>EXPLORE</span></a>
  <a class="panel" href="#"><span>ABOUT</span></a>
</div>
</body>
</html>
