<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: 'Orbitron', sans-serif;
    color: white;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  /* BACKGROUND */
  .bg-image {
    position: absolute;
    inset: 0;
    background-image: url('images/rx78-bg.png');
    background-size: cover;
    background-position: top center;
    background-repeat: no-repeat;
    z-index: 0;
  }

  .bg-image::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
  }

  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* HERO */
  .hero {
    padding: 30px 20px;
    flex-shrink: 0;
  }

  @media (max-width: 600px) {
    .hero {
      padding: 15px 10px;
    }
  }

  /* MENU */
  .menu {
    flex: 1;
    overflow-y: auto;
    padding: 80px 20px 100px;

    -webkit-mask-image: linear-gradient(
      to bottom,
      transparent 0%,
      black 60px,
      black calc(100% - 60px),
      transparent 100%
    );
    mask-image: linear-gradient(
      to bottom,
      transparent 0%,
      black 60px,
      black calc(100% - 60px),
      transparent 100%
    );

    /* scrollbar (Firefox) */
    scrollbar-color: white black;
    scrollbar-width: thin;
  }

  /* scrollbar (Chrome/Edge/Safari) */
  .menu::-webkit-scrollbar {
    width: 8px;
  }

  .menu::-webkit-scrollbar-track {
    background: black;
  }

  .menu::-webkit-scrollbar-thumb {
    background: white;
    border-radius: 4px;
  }

  .menu::-webkit-scrollbar-thumb:hover {
    background: #ccc;
  }

  @media (max-width: 600px) {
    .menu {
      padding: 80px 20px 140px;
    }
  }

  /* PANELS */
  .panel {
    position: relative;
    display: block;
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 22px 36px;
    transform: skew(-20deg) translateX(-100px);
    opacity: 0;
    margin-bottom: 25px;
    cursor: pointer;
  }

  .panel span {
    display: block;
    transform: skew(20deg);
    text-align: center;
    font-size: 24px;
    letter-spacing: 2px;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
  }

  /* /// indicator */
  .panel::after {
    content: "///";
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%) skew(20deg) rotate(0deg);
    transition: transform 0.3s ease;
  }

  /* ROTATE WHEN OPEN */
  .panel.active::after {
    transform: translateY(-50%) skew(20deg) rotate(90deg);
  }

  /* DROPDOWN */
  .dropdown {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease;
  }

  .dropdown.open {
    margin-bottom: 25px;
  }

  .dropdown .panel {
    width: 75%;
    margin: 8px 0;
    background: rgba(17,17,17,0.55);
    transform: skew(-20deg) translateX(-50px);
    opacity: 0;
  }

  @media (max-width: 600px) {
    .dropdown .panel {
      width: 65%;
    }
  }

  /* ANIMATION */
  @keyframes flyIn {
    to {
      transform: skew(-20deg) translateX(0);
      opacity: 1;
    }
  }

  </style>
</head>
<body>

<div class="app">

  <div class="bg-image"></div>

  <div class="content">

    <div class="hero"></div>

    <div class="menu">

      <!-- SCALE -->
      <div class="panel" id="scalePanel"><span>SCALE</span></div>
      <div class="dropdown" id="scaleDropdown">
        <div class="panel"><span>1/144</span></div>
        <div class="panel"><span>1/100</span></div>
        <div class="panel"><span>MISC</span></div>
      </div>

      <!-- GRADES -->
      <div class="panel" id="gradesPanel"><span>GRADES</span></div>
      <div class="dropdown" id="gradesDropdown">
        <div class="panel"><span>SD</span></div>
        <div class="panel"><span>HG</span></div>
        <div class="panel"><span>RG</span></div>
        <div class="panel"><span>MG</span></div>
        <div class="panel"><span>PG</span></div>
        <div class="panel"><span>MEGASIZE</span></div>
      </div>

      <div class="panel"><span>EXPLORE</span></div>
      <div class="panel"><span>ABOUT</span></div>

    </div>

  </div>

</div>

<script>
  const mainButtons = document.querySelectorAll('.menu > .panel');
  mainButtons.forEach((btn, i) => {
    btn.style.animation = `flyIn 0.7s forwards ${i * 0.15 + 0.5}s`;
  });

  function setupDropdown(triggerId, dropdownId) {
    const trigger = document.getElementById(triggerId);
    const dropdown = document.getElementById(dropdownId);
    const items = dropdown.querySelectorAll('.panel');

    let open = false;

    trigger.addEventListener('click', () => {
      open = !open;

      // rotate indicator
      trigger.classList.toggle('active');

      if (open) {
        dropdown.classList.add('open');
        dropdown.style.maxHeight = dropdown.scrollHeight + "px";

        items.forEach((item, i) => {
          item.style.animation = '';
          setTimeout(() => {
            item.style.animation = `flyIn 0.4s forwards ${i * 0.1}s`;
          }, 0);
        });

      } else {
        dropdown.style.maxHeight = "0";
        dropdown.classList.remove('open');

        items.forEach(item => {
          item.style.animation = 'none';
          item.style.opacity = '0';
          item.style.transform = 'skew(-20deg) translateX(-50px)';
        });
      }
    });
  }

  setupDropdown('scalePanel', 'scaleDropdown');
  setupDropdown('gradesPanel', 'gradesDropdown');
</script>

</body>
</html>
