<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  html, body {
    margin: 0;
    height: 100%;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow: hidden;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  /* BACKGROUND */
  .bg-image {
    position: absolute;
    inset: 0;
    background-image: url('images/rx78-bg.png');
    background-size: cover;
    background-position: top center;
    z-index: 0;
    transition: transform 0.8s ease;
  }

  .bg-image::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
  }

  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .menu {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 40px;
  }

  .menu::-webkit-scrollbar {
    width: 8px;
  }
  .menu::-webkit-scrollbar-thumb {
    background: white;
    border-radius: 4px;
  }

  /* PANEL (NO SKEW HERE) */
  .panel {
    position: relative;
    width: 75vw;
    max-width: 500px;
    margin-bottom: 25px;
    cursor: pointer;
    opacity: 0;
    transform: translateX(-100px);
    animation: flyIn 0.6s forwards;
  }

  /* SKEW VISUAL LAYER */
  .panel::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    transform: skew(-20deg);
    z-index: -1;
    transition: background 0.2s;
  }

  .panel:hover::before {
    background: rgba(17,17,17,0.8);
  }

  .panel span {
    display: block;
    text-align: center;
    font-size: 22px;
    padding: 20px;
  }

  /* /// indicator */
  .panel::after {
    content: "///";
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%) rotate(0deg);
    transition: transform 0.3s ease;
  }

  .panel.active::after {
    transform: translateY(-50%) rotate(90deg);
  }

  /* DROPDOWN */
  .dropdown {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .dropdown.open {
    margin-bottom: 30px;
  }

  .dropdown .panel {
    width: 50vw;
    max-width: 300px;
    margin: 8px 0;
  }

  /* MOBILE */
  @media (max-width: 600px) {
    .panel { width: 85vw; }
    .dropdown .panel { width: 65vw; }
    .panel span { font-size: 16px; }
  }

  @keyframes flyIn {
    to { transform: translateX(0); opacity:1; }
  }

  @keyframes fadeOut {
    to { transform: translateX(-100px); opacity:0; }
  }

  </style>
</head>
<body>

<div class="app">
  <div class="bg-image" id="bgImage"></div>

  <div class="content">
    <div class="menu">

      <!-- SCALE -->
      <div class="panel" id="scalePanel"><span>SCALE</span></div>
      <div class="dropdown" id="scaleDropdown">
        <div class="panel" data-link="#"><span>1/144</span></div>
        <div class="panel" data-link="#"><span>1/100</span></div>
        <div class="panel" data-link="#"><span>MISC</span></div>
      </div>

      <!-- GRADES -->
      <div class="panel" id="gradesPanel"><span>GRADES</span></div>
      <div class="dropdown" id="gradesDropdown">
        <div class="panel" data-link="#"><span>SD</span></div>
        <div class="panel" data-link="hg/index.html"><span>HG</span></div>
        <div class="panel" data-link="#"><span>RG</span></div>
        <div class="panel" data-link="#"><span>MG</span></div>
        <div class="panel" data-link="#"><span>PG</span></div>
        <div class="panel" data-link="#"><span>MEGASIZE</span></div>
      </div>

      <div class="panel" data-link="#"><span>EXPLORE</span></div>
      <div class="panel" data-link="#"><span>ABOUT</span></div>

    </div>
  </div>
</div>

<script>
const bgImage = document.getElementById('bgImage');
const buttons = document.querySelectorAll('.panel');

/* dropdown logic */
function setupDropdown(triggerId, dropdownId){
  const trigger = document.getElementById(triggerId);
  const dropdown = document.getElementById(dropdownId);
  let open = false;

  trigger.addEventListener('click', ()=>{
    open = !open;
    trigger.classList.toggle('active');

    if(open){
      dropdown.classList.add('open');
      dropdown.style.maxHeight = dropdown.scrollHeight + "px";
    } else {
      dropdown.classList.remove('open');
      dropdown.style.maxHeight = "0";
    }
  });
}

setupDropdown('scalePanel','scaleDropdown');
setupDropdown('gradesPanel','gradesDropdown');

/* navigation animation */
document.querySelectorAll('.panel[data-link]').forEach(item=>{
  item.addEventListener('click',()=>{

    buttons.forEach((btn,i)=>{
      btn.style.animation=`fadeOut 0.5s forwards ${i*0.05}s`;
    });

    bgImage.style.transform='translateX(50%)';

    const link=item.getAttribute('data-link');
    if(link && link!=='#'){
      setTimeout(()=>{ window.location.href=link; },600);
    }
  });
});
</script>

</body>
</html>
