<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  html, body {
    margin: 0;
    height: 100%;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow: hidden;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  .bg-image {
    position: absolute;
    inset: 0;
    background-image: url('images/rx78-bg.png');
    background-size: cover;
    background-position: top center;
    background-repeat: no-repeat;
    z-index: 0;
    transition: transform 0.8s ease;
  }

  .bg-image::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
  }

  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .menu {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 40px;
  }

  .menu::-webkit-scrollbar { width: 8px; }
  .menu::-webkit-scrollbar-thumb { background: white; }

  /* PANEL BASE */
  .panel {
    position: relative;
    width: 75vw;
    max-width: 500px;
    margin-bottom: 25px;
    cursor: pointer;
    opacity: 0;
    transform: translateX(-100px);
    animation: flyIn 0.6s forwards;
  }

  /* SKEW BACKGROUND (SAFE) */
  .panel::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    transform: skew(-20deg);
    z-index: -1;
  }

  .panel span {
    display: block;
    text-align: center;
    font-size: 22px;
    padding: 20px;
  }

  .panel::after {
    content: "///";
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
  }

  /* DROPDOWN */
  .dropdown {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .dropdown.open {
    max-height: 500px;
    margin-bottom: 30px;
  }

  .dropdown .panel {
    width: 50vw;
    max-width: 300px;
    margin: 8px 0;
  }

  /* MOBILE */
  @media (max-width:600px) {
    .panel { width: 80vw; }
    .dropdown .panel { width: 60vw; }
    .panel span { font-size: 16px; }
  }

  @keyframes flyIn {
    to { transform: translateX(0); opacity:1; }
  }

  </style>
</head>
<body>

<div class="app">
  <div class="bg-image" id="bgImage"></div>

  <div class="content">
    <div class="menu">

      <div class="panel" id="scaleBtn"><span>SCALE</span></div>
      <div class="dropdown" id="scaleMenu">
        <div class="panel"><span>1/144</span></div>
        <div class="panel"><span>1/100</span></div>
      </div>

      <div class="panel" id="gradeBtn"><span>GRADES</span></div>
      <div class="dropdown" id="gradeMenu">
        <div class="panel"><span>HG</span></div>
        <div class="panel"><span>MG</span></div>
      </div>

    </div>
  </div>
</div>

<script>
function toggle(btn, menu){
  let open=false;
  btn.onclick=()=>{
    open=!open;
    menu.classList.toggle('open');
  };
}

toggle(
  document.getElementById('scaleBtn'),
  document.getElementById('scaleMenu')
);

toggle(
  document.getElementById('gradeBtn'),
  document.getElementById('gradeMenu')
);
</script>

</body>
</html>
