<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: #0a0a0a;
    color: white;
    overflow-x: hidden;
  }

  /* HERO BANNER FADE IN */
  .hero {
    text-align: center;
    padding: 40px 20px;
    opacity: 0;
    animation: fadeIn 1s forwards;
    animation-delay: 0.2s;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .hero h1 {
    margin: 0;
    font-size: 32px;
  }

  .hero p {
    margin: 5px 0 0;
    font-size: 16px;
  }

  /* BUTTONS FLY IN CASCADE */
  .menu {
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 15px;
  }

  .panel {
    position: relative;
    display: block;
    text-decoration: none;
    color: white;
    background: #111;
    border: 3px solid white;
    padding: 22px 36px;
    transform: skew(-20deg) translateX(-100px);
    opacity: 0;
    transition: 0.2s;
    cursor: pointer;
    margin: 0;
  }

  .panel span {
    display: block;
    transform: skew(20deg);
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    letter-spacing: 2px;
  }

  .panel::after {
    content: "///";
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%) skew(20deg);
    font-weight: bold;
    color: white;
    font-size: 18px;
    transition: transform 0.3s ease;
  }

  .panel:hover {
    background: #222;
    transform: skew(-20deg) translateX(6px);
  }

  /* Dropdown */
  .dropdown {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
    align-items: center;
  }

  .panel.active + .dropdown {
    max-height: 500px;
  }

  .dropdown .panel {
    background: #222;
    border: 3px solid white;
    padding: 22px 18px;
    margin: 5px 0;
    transform: skew(-20deg) translateX(-50px);
    opacity: 0;
    width: 50%;
  }

  .dropdown .panel span {
    font-size: 20px;
  }

  .dropdown .panel:hover {
    background: #333;
    transform: skew(-20deg) translateX(4px);
  }

  /* KEYFRAMES FOR CASCADE */
  @keyframes flyIn {
    to {
      transform: skew(-20deg) translateX(0);
      opacity: 1;
    }
  }

  /* FADE OUT */
  .fade-out {
    animation: fadeOut 1s forwards;
  }

  @keyframes fadeOut {
    to {
      opacity: 0;
      transform: translateY(-20px);
    }
  }

  </style>
</head>
<body>

  <!-- Hero banner -->
  <div class="hero">
    <h1>RX-78-2 GUNDAM</h1>
    <p>Prototype Close Quarters Combat Mobile Suit</p>
  </div>

  <!-- Navigation panels -->
  <div class="menu">
    <a class="panel" href="index.html"><span>HOME</span></a>
    <div class="panel" id="gradesPanel"><span>GRADES</span></div>
    <div class="dropdown">
      <a class="panel" href="hg/index.html"><span>HG</span></a>
      <a class="panel" href="rg/index.html"><span>RG</span></a>
      <a class="panel" href="mg/index.html"><span>MG</span></a>
    </div>
    <a class="panel" href="#"><span>EXPLORE</span></a>
    <a class="panel" href="#"><span>ABOUT</span></a>
  </div>

  <script>
    // Dropdown toggle
    const gradesPanel = document.getElementById('gradesPanel');
    gradesPanel.addEventListener('click', () => {
      gradesPanel.classList.toggle('active');
      const dropdownItems = gradesPanel.nextElementSibling.querySelectorAll('.panel');
      dropdownItems.forEach((item, index) => {
        item.style.animation = `flyIn 0.5s forwards ${index * 0.1 + 0.1}s`;
      });
    });

    // Cascade fly-in for main menu
    const mainButtons = document.querySelectorAll('.menu > .panel');
    mainButtons.forEach((btn, i) => {
      btn.style.animation = `flyIn 0.7s forwards ${i * 0.15 + 1}s`; // stagger
    });

    // Fade out navigation before leaving page
    const links = document.querySelectorAll('.panel[href]');
    links.forEach(link => {
      link.addEventListener('click', function(e){
        e.preventDefault();
        const href = this.getAttribute('href');
        // add fade-out to hero + menu + all buttons
        document.querySelectorAll('.hero, .menu, .menu .panel, .dropdown .panel').forEach(el => {
          el.classList.add('fade-out');
        });
        // wait until fade-out animation completes (1s) before navigating
        setTimeout(() => {
          window.location = href;
        }, 1000);
      });
    });
  </script>
</body>
</html>
