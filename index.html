<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow-x: hidden;

    /* 🔥 prevents mobile bounce shifting */
    overscroll-behavior: none;
  }

  /* ✅ BULLETPROOF BACKGROUND */
  .bg-image {
    position: fixed;
    inset: 0;

    background-image: url('images/rx78-bg.png');
    background-size: cover;
    background-position: top center;
    background-repeat: no-repeat;

    z-index: -2;

    /* 🔥 mobile stability fix */
    transform: translateZ(0);
    will-change: transform;
  }

  .bg-image::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 40px 20px;
    opacity: 0;
    animation: fadeIn 1s forwards;
    animation-delay: 0.2s;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .hero h1 { margin: 0; font-size: 32px; }
  .hero p { margin: 5px 0 0; font-size: 16px; }

  /* MENU */
  .menu {
    display: flex;
    flex-direction: column;
    padding: 20px;
  }

  .panel {
    position: relative;
    display: block;
    text-decoration: none;
    color: white;
    background: rgba(17,17,17,0.9);
    border: 3px solid white;
    padding: 22px 36px;
    transform: skew(-20deg) translateX(-100px);
    opacity: 0;
    transition: 0.2s;
    cursor: pointer;
    margin-bottom: 25px;
  }

  .panel:last-child {
    margin-bottom: 0;
  }

  .panel span {
    display: block;
    transform: skew(20deg);
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    letter-spacing: 2px;
  }

  .panel::after {
    content: "///";
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%) skew(20deg);
    font-size: 18px;
  }

  .panel:hover {
    background: rgba(34,34,34,0.95);
    transform: skew(-20deg) translateX(6px);
  }

  /* DROPDOWN */
  .dropdown {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease;
  }

  .dropdown.open {
    margin-bottom: 25px;
  }

  .dropdown .panel {
    width: 75%;
    margin: 8px 0;
    padding: 18px 45px 18px 25px;
    background: rgba(34,34,34,0.9);
    transform: skew(-20deg) translateX(-50px);
    opacity: 0;
  }

  /* MOBILE FIX */
  @media (max-width: 600px) {
    .dropdown .panel {
      width: 65%;
      padding: 16px 40px 16px 20px;
    }
  }

  .dropdown .panel span {
    font-size: 20px;
  }

  .dropdown .panel:hover {
    background: rgba(51,51,51,0.95);
    transform: skew(-20deg) translateX(4px);
  }

  /* ANIMATIONS */
  @keyframes flyIn {
    to {
      transform: skew(-20deg) translateX(0);
      opacity: 1;
    }
  }

  @keyframes fadeOut {
    to {
      opacity: 0;
      transform: translateY(-20px);
    }
  }

  .fade-out {
    animation: fadeOut 1s forwards;
  }

  </style>
</head>
<body>

  <!-- BACKGROUND -->
  <div class="bg-image"></div>

  <!-- HERO -->
  <div class="hero">
    <h1>RX-78-2 GUNDAM</h1>
    <p>Prototype Close Quarters Combat Mobile Suit</p>
  </div>

  <!-- MENU -->
  <div class="menu">

    <!-- SCALE -->
    <div class="panel" id="scalePanel"><span>SCALE</span></div>
    <div class="dropdown" id="scaleDropdown">
      <a class="panel"><span>1/144</span></a>
      <a class="panel"><span>1/100</span></a>
    </div>

    <!-- GRADES -->
    <div class="panel" id="gradesPanel"><span>GRADES</span></div>
    <div class="dropdown" id="gradesDropdown">
      <a class="panel" href="hg/index.html"><span>HG</span></a>
      <a class="panel"><span>RG</span></a>
      <a class="panel"><span>MG</span></a>
      <a class="panel"><span>PG</span></a>
      <a class="panel"><span>MEGASIZE</span></a>
    </div>

    <a class="panel"><span>EXPLORE</span></a>
    <a class="panel"><span>ABOUT</span></a>

  </div>

  <script>
    // MAIN BUTTON STAGGER IN
    const mainButtons = document.querySelectorAll('.menu > .panel');
    mainButtons.forEach((btn, i) => {
      btn.style.animation = `flyIn 0.7s forwards ${i * 0.15 + 1}s`;
    });

    function setupDropdown(triggerId, dropdownId) {
      const trigger = document.getElementById(triggerId);
      const dropdown = document.getElementById(dropdownId);
      const items = dropdown.querySelectorAll('.panel');

      let open = false;

      trigger.addEventListener('click', () => {
        open = !open;

        if (open) {
          dropdown.classList.add('open');
          dropdown.style.maxHeight = dropdown.scrollHeight + "px";

          items.forEach((item, i) => {
            item.style.animation = '';
            setTimeout(() => {
              item.style.animation = `flyIn 0.5s forwards ${i * 0.1}s`;
            }, 0);
          });

        } else {
          // INSTANT COLLAPSE (clean system feel)
          dropdown.style.maxHeight = "0";
          dropdown.classList.remove('open');

          items.forEach((item) => {
            item.style.animation = 'none';
            item.style.opacity = '0';
            item.style.transform = 'skew(-20deg) translateX(-40px)';
          });
        }
      });
    }

    setupDropdown('scalePanel', 'scaleDropdown');
    setupDropdown('gradesPanel', 'gradesDropdown');
  </script>

</body>
</html>
