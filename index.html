<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  html, body {
    margin: 0;
    height: 100%;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow-x: hidden;
    overflow-y: hidden;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow-x: hidden;
    overflow-y: hidden;
  }

  .bg-image {
  position: absolute;
  inset: 0;
  background-image: url('rx78-bg.png');
  background-size: cover;
  background-position: top center;
  background-repeat: no-repeat;
  z-index: 0;
  opacity: 0;
  transition: transform 0.8s ease;
}

#bgActive {
  position: absolute;
  inset: 0;
  background-image: url('rx78-bg-active.png');
  background-size: cover;
  background-position: top center;
  background-repeat: no-repeat;
  z-index: 0;

  opacity: 0;
  transition: opacity 5s cubic-bezier(0.22, 1, 0.36, 1);
}


  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .hero {
    padding: 30px 20px;
    flex-shrink: 0;
  }

  .menu {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .scroll-container {
    flex: 1;
    display: flex;
    flex-direction: column;

    overflow-y: auto;
    overflow-x: hidden;

    padding-bottom: 50px;

    scrollbar-color: white black;
    scrollbar-width: thin;

    -webkit-mask-image: linear-gradient(
      to bottom,
      transparent 0%,
      black 30px,
      black calc(100% - 60px),
      transparent 100%
    );
    mask-image: linear-gradient(
      to bottom,
      transparent 0%,
      black 30px,
      black calc(100% - 60px),
      transparent 100%
    );
  }

  .scroll-container::-webkit-scrollbar:horizontal {
    display: none;
  }

  .scroll-container::-webkit-scrollbar { width: 8px; }
  .scroll-container::-webkit-scrollbar-track { background: black; }
  .scroll-container::-webkit-scrollbar-thumb { background: white; border-radius:4px; }

  .button-container {
    display: flex;
    flex-direction: column;
    margin-top: auto;
    align-items: center;
  }

  .button-container > .panel {
    width: 75vw;
    max-width: 90%;
    margin-bottom: 25px;
  }

  .panel {
    position: relative;
    display: block;
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 22px 50px 22px 36px;
    transform: skew(-20deg) translateX(-100px);
    opacity: 0;
    cursor: pointer;
    box-sizing: border-box;
    transition: background 0.2s;
    z-index: 1;
    touch-action: manipulation;
  }

  .panel:hover { background: rgba(17,17,17,0.8); }

  /* ✅ FIXED TEXT (responsive + no overflow) */
  .panel span {
    display: block;
    transform: skew(20deg);
    text-align: center;

    font-size: clamp(16px, 5vw, 24px);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .panel::after {
    content: "";
    position: absolute;
    right: 14px;
    top: 50%;
    width: 18px;
    height: 18px;
    border: 2px solid white;
    border-radius: 50%;
    transform: translateY(-50%) skew(20deg);
  }

  .panel::before {
    content: "";
    position: absolute;
    right: 23px;
    top: 50%;
    width: 2px;
    height: 12px;
    background: white;
    transform: translate(-50%, -50%) skew(20deg) rotate(0deg);
    transition: transform 0.3s ease;
  }

  .panel.active::before {
    transform: translate(-50%, -50%) skew(20deg) rotate(90deg);
  }

  .dropdown {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease;
  }

  .dropdown.open {
    margin-bottom: 40px;
    position: relative;
    z-index: 20;
  }

  /* ✅ WIDER DROPDOWN BUTTONS */
  .dropdown .panel {
    width: 45vw;
    max-width: 60%;
    margin: 8px 0;
    background: rgba(17,17,17,0.55);
    transform: translateX(-50px);
    opacity: 0;
    z-index: 25;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 18px 20px;
  }

  /* ✅ FIX DROPDOWN TEXT */
  .dropdown .panel span {
    transform: none;
    text-align: center;
    width: 100%;

    font-size: clamp(12px, 3.5vw, 16px);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .dropdown .panel::after,
  .dropdown .panel::before {
    content: none;
  }
#entryGate {
  position: fixed;
  inset: 0;
  background: transparent;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
}

.gate-center {
  position: relative;
  width: 220px;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#bootText {
  position: absolute;
  color: white;
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  opacity: 0;
  transition: opacity 0.4s ease;
  text-align: center;

  /* 👇 NEW */
  background: rgba(0, 0, 0, 0.75);
  padding: 8px 14px;
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: 4px;
}

#enterBtn {
  background: rgba(0, 0, 0, 0.85);  /* 👈 solid but still slightly breathable */
  border: 2px solid white;
  color: white;
  padding: 10px 20px;
  cursor: pointer;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 2px;
}

#resetBoot {
  position: fixed;
  top: 0;
  left: 0;
  width: 80px;
  height: 80px;
  z-index: 10000;

  /* fully invisible but clickable */
  background: transparent;
}

#enterBtn {
  position: relative;
  z-index: 10;
}

#enterBtn {
  position: relative;
  z-index: 10;
}

#bootText {
  z-index: 5;
  pointer-events: none;
}

.ring {
  pointer-events: none;
}

#bootText {
  z-index: 5;
  pointer-events: none;
}

.ring {
  pointer-events: none;
}

  @media (max-width: 600px) {
    .panel {
      width: 80vw;
      max-width: 80vw;
    }

    .dropdown .panel {
      width: 60vw;
      max-width: 60vw;
      transform: translateX(-40px);
    }

    .dropdown .panel span {
      font-size: clamp(12px, 4vw, 16px);
      letter-spacing: 1px;
    }
  }

  @keyframes flyIn {
    to { transform: skew(-20deg) translateX(0); opacity:1; }
  }

  @keyframes fadeOut {
    to { transform: skew(-20deg) translateX(-100px); opacity:0; }
  }

  @keyframes flyInDropdown {
    to { transform: translateX(0); opacity:1; }
  }

  @keyframes fadeOutDropdown {
    to { transform: translateX(-100px); opacity:0; }
  }

  .ring {
  position: absolute;
  border: 4px dashed rgba(255,255,255,0.5);
  border-radius: 50%;
  inset: 0;
}
.r1 {
  inset: 0;
}

.r2 {
  inset: 18px;
  opacity: 0.7;
}

.r3 {
  inset: 36px;
  opacity: 0.4;
}

.r1, .r2, .r3 {
  animation: none;
}

.ring.active.r1 { animation: spin 6s linear infinite; }
.ring.active.r2 { animation: spinReverse 8s linear infinite; }
.ring.active.r3 { animation: spin 10s linear infinite; }

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes spinReverse {
  from { transform: rotate(360deg); }
  to { transform: rotate(0deg); }
}

  </style>
</head>
<body>
<div id="resetBoot"></div>
<div id="entryGate">
  <div class="gate-center">

    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>

    <div id="bootText">INITIALIZING</div>

    <button id="enterBtn">ENTER SYSTEM</button>

  </div>
</div>

<div class="app">
  <div class="bg-image" id="bgImage"></div>
  <div class="bg-image" id="bgActive"></div>
  <div class="content">
    <div class="hero"></div>

    <div class="menu">
      <div class="scroll-container">
        <div class="button-container">

          <div class="panel"><span>EXPLORE</span></div>
          
          <div class="panel" id="gradesPanel"><span>GRADES</span></div>
          <div class="dropdown" id="gradesDropdown">
            <div class="panel" data-link="kits.html?grade=SD"><span>SD</span></div>
            <div class="panel" data-link="kits.html?grade=HG"><span>HG</span></div>
            <div class="panel" data-link="kits.html?grade=RG"><span>RG</span></div>
            <div class="panel" data-link="kits.html?grade=MG"><span>MG</span></div>
            <div class="panel" data-link="kits.html?grade=PG"><span>PG</span></div>
            <div class="panel" data-link="kits.html?grade=MEGASIZE"><span>MEGA SIZE</span></div>
            <div class="panel"><span>MISC</span></div>
          </div>

          <div class="panel"><span>CUSTOMS</span></div>
          <div class="panel"><span>ABOUT</span></div>

        </div>
      </div>
    </div>

  </div>
</div>

<script>
const bgImage = document.getElementById('bgImage');
const mainButtons = document.querySelectorAll('.button-container > .panel');

let bootComplete = false;

function setupDropdown(triggerId, dropdownId){
  const trigger=document.getElementById(triggerId);
  const dropdown=document.getElementById(dropdownId);
  const items=dropdown.querySelectorAll('.panel');
  let open=false;

  trigger.addEventListener('click',()=>{
    open=!open;
    trigger.classList.toggle('active');

    if(open){
      dropdown.classList.add('open');
      dropdown.style.maxHeight=dropdown.scrollHeight+"px";

      items.forEach((item,i)=>{
        item.style.animation="none";
        item.offsetHeight;
        item.style.animation=`flyInDropdown 0.4s forwards ${i*0.1}s`;
      });

    } else {
      dropdown.style.maxHeight="0";
      dropdown.classList.remove('open');
      items.forEach(item=>{ item.style.opacity='0'; });
    }
  });
}

setupDropdown('gradesPanel','gradesDropdown');

document.querySelectorAll('.panel[data-link]').forEach(item=>{
  item.addEventListener('click',()=>{
    if (!bootComplete) return;
    document.querySelector('.scroll-container').style.overflow = 'hidden';

    mainButtons.forEach((btn,i)=>{
      btn.style.animation=`fadeOut 0.5s forwards ${i*0.05}s`;
    });

    document.querySelectorAll('.dropdown.open .panel').forEach((d,i)=>{
      d.style.animation=`fadeOutDropdown 0.5s forwards ${i*0.05}s`;
    });

    bgImage.style.transform='translateX(50%)';

    const link=item.getAttribute('data-link');
    if(link && link!=='#'){
      setTimeout(()=>{ window.location.href=link; },600);
    }
  });
});


  document.addEventListener("DOMContentLoaded", () => {
const fromKits = sessionStorage.getItem("fromKits");
sessionStorage.removeItem("fromKits");

const bg = document.getElementById("bgImage");

if (!fromKits) {
  // ✅ normal entry → fade in
  bg.style.opacity = "0";

  setTimeout(() => {
    bg.style.transition = "opacity 0.8s ease";
    bg.style.opacity = "1";
  }, 50);

} else {
  // ✅ coming from kits → instant show (no fade)
  bg.style.opacity = "1";
}
  // ✅ ALWAYS reset transform state so slide animation can re-trigger properly
bg.style.transition = "none";
bg.style.transform = "translateX(0%)";

// force reflow so browser "locks in" reset state
bg.offsetHeight;

// restore transition AFTER reset
requestAnimationFrame(() => {
  bg.style.transition = "transform 0.8s ease";
});
  const resetZone = document.getElementById("resetBoot");

resetZone.addEventListener("click", () => {
  localStorage.removeItem("lastAccessTime");

  console.log("Boot timer reset");

  // optional: quick visual feedback for dev
  resetZone.style.background = "rgba(255,255,255,0.1)";
  setTimeout(() => {
    resetZone.style.background = "transparent";
  }, 150);
});
    
  const overlay = document.getElementById("entryGate");
  const btn = document.getElementById("enterBtn");

  const now = Date.now();
  const lastAccess = localStorage.getItem("lastAccessTime");
  const TEN_MIN = 10 * 60 * 1000;

  if (!lastAccess || (now - lastAccess) > TEN_MIN) {
  // ✅ SHOW BOOT
  overlay.style.display = "flex";

} else {
  // ✅ SKIP BOOT → instantly unlock UI
  bootComplete = true;

  const buttons = document.querySelectorAll(".button-container > .panel");

  buttons.forEach((btn, i) => {
    btn.style.opacity = "0";
    btn.style.transform = "skew(-20deg) translateX(-100px)";

    setTimeout(() => {
      btn.style.animation = `flyIn 0.7s forwards`;
    }, i * 120);
  });
}

  btn.addEventListener("click", () => {
    startBootSequence();
    localStorage.setItem("lastAccessTime", Date.now());
  });
});
  
function startBootSequence() {

  const overlay = document.getElementById("entryGate");
  const enterBtn = document.getElementById("enterBtn");
  const bootText = document.getElementById("bootText");

  const rings = document.querySelectorAll(".ring");

  const bgIdle = document.getElementById("bgImage");
  const bgActive = document.getElementById("bgActive");

  // PHASE 1 — lock button
  enterBtn.style.opacity = "0";
  rings.forEach(r => r.classList.add("active"));
  enterBtn.style.pointerEvents = "none";

  bootText.style.opacity = "1";
  bootText.textContent = "CREDENTIAL CONFIRMED";

  // PHASE 2 — activate background + system online
  setTimeout(() => {

  bootText.textContent = "SYSTEM ONLINE";

  // ⚡ FAST activation
  bgActive.style.transition = "opacity 0.25s ease-out";
  bgActive.style.opacity = "1";

}, 2500);

  // PHASE 3 — HOLD state
  setTimeout(() => {

    // keep everything stable for 2 seconds
    // (this is your “sustain moment”)

  }, 600 + 2500);

 // PHASE 4 — EXIT transition
setTimeout(() => {

  // 🔥 NAV STARTS IMMEDIATELY after SYSTEM ONLINE phase
  bootComplete = true;

  const buttons = document.querySelectorAll(".button-container > .panel");

  buttons.forEach((btn, i) => {
    btn.style.opacity = "0";
    btn.style.transform = "skew(-20deg) translateX(-100px)";

    setTimeout(() => {
      btn.style.animation = `flyIn 0.7s forwards`;
    }, i * 120);
  });

  // 🎭 overlay fades AFTER nav already started
  overlay.style.transition = "opacity 0.9s ease";
  overlay.style.opacity = "0";

  setTimeout(() => {
    overlay.style.display = "none";
  }, 900);

  // 🌌 background fades OUT independently (linger effect)
  setTimeout(() => {

  // 🌌 SLOW fade-out (lingers behind UI)
  bgActive.style.transition = "opacity 2.2s cubic-bezier(0.22, 1, 0.36, 1)";
  bgActive.style.opacity = "0";

}, 800); // 👈 tweak this (600–1000 sweet spot)

}, 5000);
}
window.addEventListener("pageshow", () => {
  const bg = document.getElementById("bgImage");

  // HARD RESET STATE EVERY TIME PAGE IS SHOWN
  bg.style.transition = "none";
  bg.style.transform = "translateX(0%)";

  bg.offsetHeight;

  requestAnimationFrame(() => {
    bg.style.transition = "transform 0.8s ease";
  });
});
</script>

</body>
</html>
