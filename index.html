<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RX-78 Portal Dropdown</title>
<style>
  body {
    background: #111;
    font-family: 'Orbitron', sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 2rem;
  }

  /* Panel container */
  .panel {
    position: relative;
    background: #222;
    border: 3px solid white;
    transform: skew(-20deg);
    margin: 1rem 0;
    cursor: pointer;
    overflow: hidden;
    width: 200px;
  }

  /* Panel text */
  .panel span {
    display: block;
    padding: 1rem;
    transform: skew(20deg);
    text-align: center;
    font-weight: bold;
    font-size: 1.2rem;
  }

  /* Right-side /// detail */
  .panel::after {
    content: "///";
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%) skew(20deg);
    font-weight: bold;
    color: #fff;
  }

  /* Dropdown menu */
  .dropdown {
    display: none;
    flex-direction: column;
    background: #333;
    border-top: 2px solid white;
  }

  .dropdown a {
    padding: 0.75rem;
    text-align: center;
    color: white;
    text-decoration: none;
    border-bottom: 1px solid #555;
    transform: skew(20deg);
  }

  .dropdown a:hover {
    background: #444;
  }

  /* Show dropdown when active */
  .panel.active + .dropdown {
    display: flex;
  }
</style>
</head>
<body>

<!-- Grades Panel -->
<div class="panel" id="gradesPanel">
  <span>Grades</span>
</div>

<!-- Dropdown Menu -->
<div class="dropdown">
  <a href="hg/index.html">HG</a>
  <a href="rg/index.html">RG</a>
  <a href="mg/index.html">MG</a>
</div>

<script>
  const panel = document.getElementById('gradesPanel');
  panel.addEventListener('click', () => {
    panel.classList.toggle('active');
  });
</script>

</body>
</html>
