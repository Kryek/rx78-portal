<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Orbitron', sans-serif;
      color: white;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .bg-image {
      position: absolute;
      inset: 0;
      background: url('images/rx78-bg.png') top center no-repeat;
      background-size: cover;
      transition: transform 1s ease;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 25px;
      align-items: center;
      transition: opacity 0.7s ease;
    }

    .panel {
      position: relative;
      background: rgba(17,17,17,0.65);
      border: 3px solid white;
      padding: 20px 36px;
      cursor: pointer;
      transform: skew(-20deg) translateX(-100px);
      opacity: 0;
    }

    .panel span {
      display: block;
      transform: skew(20deg);
      font-size: 24px;
      letter-spacing: 2px;
      text-align: center;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }

    .panel::after {
      content: "///";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%) skew(20deg);
    }

    @keyframes flyIn {
      to { transform: skew(-20deg) translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>

<div class="app">

  <div class="bg-image" id="bgImage"></div>

  <div class="content home" id="homeContent">
    <div class="menu">
      <div class="panel" data-target="hg/index.html"><span>HG</span></div>
      <div class="panel" data-target="mg/index.html"><span>MG</span></div>
      <div class="panel" data-target="sd/index.html"><span>SD</span></div>
      <div class="panel" data-target="about.html"><span>ABOUT</span></div>
    </div>
  </div>

</div>

<script>
  const homeButtons = document.querySelectorAll('.home .panel');
  const bg = document.getElementById('bgImage');
  const homeContent = document.getElementById('homeContent');

  // Fly-in on load
  homeButtons.forEach((btn,i)=>{
    btn.style.animation = `flyIn 0.7s forwards ${i*0.15 + 0.5}s`;
  });

  homeButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.target;
      // Slide background right
      bg.style.transform = 'translateX(50%)';
      // Fade out home buttons
      homeContent.style.opacity = '0';
      // Wait for animation before navigating
      setTimeout(()=> { window.location.href = target; }, 1000);
    });
  });
</script>

</body>
</html>
