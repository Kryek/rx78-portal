<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  html, body {
    margin: 0;
    height: 100%;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow-x: hidden;
    overflow-y: hidden;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  .bg-image {
    position: absolute;
    inset: 0;
    background-image: url('images/rx78-bg.png');
    background-size: cover;
    background-position: top center;
    z-index: 0;
    transition: transform 0.8s ease;
  }

  .bg-image::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
  }

  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .menu {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    overflow-y: auto;
    padding-bottom: 40px;
  }

  .menu::-webkit-scrollbar {
    width: 8px;
  }
  .menu::-webkit-scrollbar-thumb {
    background: white;
    border-radius: 4px;
  }

  /* MAIN BUTTONS */
  .panel {
    width: 70vw;
    max-width: 500px;
    margin: 0 auto 25px auto;

    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 22px 36px;

    transform: skew(-20deg) translateX(-100px);
    opacity: 0;

    cursor: pointer;
    transition: background 0.2s;
  }

  .panel:hover {
    background: rgba(17,17,17,0.8);
  }

  .panel span {
    display: block;
    transform: skew(20deg);
    text-align: center;
    font-size: 22px;
  }

  /* /// indicator */
  .panel::after {
    content: "///";
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%) skew(20deg) rotate(0deg);
    transition: transform 0.3s ease;
  }

  .panel.active::after {
    transform: translateY(-50%) skew(20deg) rotate(90deg);
  }

  /* DROPDOWN */
  .dropdown {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .dropdown.open {
    margin-bottom: 30px;
  }

  .dropdown .panel {
    width: 45vw;
    max-width: 300px;
    margin: 8px auto;

    transform: skew(-20deg) translateX(-60px);
  }

  /* MOBILE FIX */
  @media (max-width: 600px) {

    .panel {
      width: 80vw;
    }

    .dropdown .panel {
      width: 60vw;
      transform: skew(-20deg) translateX(-40px);
    }

    .panel span {
      font-size: 16px;
    }
  }

  @keyframes flyIn {
    to { transform: skew(-20deg) translateX(0); opacity:1; }
  }

  @keyframes fadeOut {
    to { transform: skew(-20deg) translateX(-100px); opacity:0; }
  }

  </style>
</head>
<body>

<div class="app">
  <div class="bg-image" id="bgImage"></div>

  <div class="content">
    <div class="menu">

      <div class="panel" id="scalePanel"><span>SCALE</span></div>
      <div class="dropdown" id="scaleDropdown">
        <div class="panel"><span>1/144</span></div>
        <div class="panel"><span>1/100</span></div>
        <div class="panel"><span>MISC</span></div>
      </div>

      <div class="panel" id="gradesPanel"><span>GRADES</span></div>
      <div class="dropdown" id="gradesDropdown">
        <div class="panel"><span>SD</span></div>
        <div class="panel" data-link="hg/index.html"><span>HG</span></div>
        <div class="panel"><span>RG</span></div>
        <div class="panel"><span>MG</span></div>
        <div class="panel"><span>PG</span></div>
        <div class="panel"><span>MEGASIZE</span></div>
      </div>

      <div class="panel"><span>EXPLORE</span></div>
      <div class="panel"><span>ABOUT</span></div>

    </div>
  </div>
</div>

<script>
const bgImage = document.getElementById('bgImage');
const panels = document.querySelectorAll('.panel');

panels.forEach((btn,i)=>{
  btn.style.animation=`flyIn 0.6s forwards ${i*0.1+0.3}s`;
});

function setupDropdown(triggerId, dropdownId){
  const trigger = document.getElementById(triggerId);
  const dropdown = document.getElementById(dropdownId);
  let open = false;

  trigger.addEventListener('click', ()=>{
    open = !open;
    trigger.classList.toggle('active');

    if(open){
      dropdown.classList.add('open');
      dropdown.style.maxHeight = dropdown.scrollHeight + "px";
    } else {
      dropdown.classList.remove('open');
      dropdown.style.maxHeight = "0";
    }
  });
}

setupDropdown('scalePanel','scaleDropdown');
setupDropdown('gradesPanel','gradesDropdown');

document.querySelectorAll('[data-link]').forEach(item=>{
  item.addEventListener('click',()=>{
    panels.forEach((btn,i)=>{
      btn.style.animation=`fadeOut 0.5s forwards ${i*0.05}s`;
    });

    bgImage.style.transform='translateX(50%)';

    const link=item.getAttribute('data-link');
    if(link){
      setTimeout(()=>{ window.location.href=link; },600);
    }
  });
});
</script>

</body>
</html>
