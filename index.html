<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #0a0a0a;
      color: white;
    }

    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    .menu {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
    }

    .panel {
      position: relative;
      background: #111;
      border: 2px solid white;
      padding: 20px 30px;
      font-size: 22px;
      font-weight: bold;
      text-decoration: none;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
      clip-path: polygon(
        15px 0%, 100% 0%, 100% 100%, 15px 100%, 0% 50%
      );
      transition: 0.2s;
    }

    /* Right-end stripes */
    .panel::before {
      content: "///";
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-weight: bold;
      opacity: 0.7;
    }

    .panel:hover {
      background: #222;
      transform: translateX(3px);
    }

    .panel-text {
      z-index: 1;
    }
  </style>
</head>
<body>

  <div class="menu">
    <a class="panel" href="hg/index.html">
      <span class="panel-text">GRADES</span>
    </a>
    <a class="panel" href="#">
      <span class="panel-text">EXPLORE</span>
    </a>
    <a class="panel" href="#">
      <span class="panel-text">ABOUT</span>
    </a>
  </div>

</body>
</html>
