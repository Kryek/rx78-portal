<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  html, body {
    margin: 0;
    height: 100%;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow: hidden;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  .bg-image {
    position: absolute;
    inset: 0;
    background-image: url('images/rx78-bg.png');
    background-size: cover;
    background-position: top center;
    background-repeat: no-repeat;
    z-index: 0;
    transition: transform 0.8s ease;
  }

  .bg-image::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
  }

  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .hero {
    padding: 30px 20px;
    flex-shrink: 0;
  }

  .menu {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .scroll-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
    max-height: 100%;
    scrollbar-color: white black;
    scrollbar-width: thin;
    padding-bottom: 50px;
  }

  .scroll-container::-webkit-scrollbar { width: 8px; }
  .scroll-container::-webkit-scrollbar-track { background: black; }
  .scroll-container::-webkit-scrollbar-thumb { background: white; border-radius:4px; }

  .button-container {
    display: flex;
    flex-direction: column;
    margin-top: auto;
    align-items: center;
  }

  .button-container > .panel {
    width: 75vw;
    max-width: 90%;
    margin-bottom: 25px;
  }

  .panel {
    position: relative;
    display: block;
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 22px 36px;
    transform: skew(-20deg) translateX(-100px);
    opacity: 0;
    cursor: pointer;
    box-sizing: border-box;
  }

  .panel span {
    display: block;
    transform: skew(20deg);
    text-align: center;
    font-size: 24px;
  }

  .panel::after {
    content: "///";
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%) skew(20deg);
  }

  .dropdown {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease;
  }

  .dropdown.open {
    margin-bottom: 40px;
  }

  /* DESKTOP (unchanged) */
  .dropdown .panel {
    width: 37.5vw;
    max-width: 50%;
    margin: 8px 0;
    background: rgba(17,17,17,0.55);
    transform: skew(-20deg) translateX(-50px);
    opacity: 0;
  }

  /* ✅ MOBILE IMPROVEMENT */
 @media (max-width: 600px) {
  .panel {
    width: 80%;
  }

  /* align dropdown with main buttons */
  .dropdown {
    align-items: flex-start;
    width: 80%;
  }

  .dropdown .panel {
    width: 70%;
    max-width: 70%;
    margin-left: 0;
  }

  .dropdown .panel span {
    font-size: 16px;
    letter-spacing: 1px;
    text-align: left;
  }
}

  @keyframes flyIn {
    to { transform: skew(-20deg) translateX(0); opacity:1; }
  }

  @keyframes fadeOut {
    to { transform: skew(-20deg) translateX(-100px); opacity:0; }
  }

  </style>
</head>
<body>

<div class="app">
  <div class="bg-image" id="bgImage"></div>

  <div class="content">
    <div class="hero"></div>

    <div class="menu">
      <div class="scroll-container">
        <div class="button-container">

          <div class="panel" id="scalePanel"><span>SCALE</span></div>
          <div class="dropdown" id="scaleDropdown">
            <div class="panel"><span>1/144</span></div>
            <div class="panel"><span>1/100</span></div>
            <div class="panel"><span>MISC</span></div>
          </div>

          <div class="panel" id="gradesPanel"><span>GRADES</span></div>
          <div class="dropdown" id="gradesDropdown">
            <div class="panel"><span>SD</span></div>
            <div class="panel" data-link="hg/index.html"><span>HG</span></div>
            <div class="panel"><span>RG</span></div>
            <div class="panel"><span>MG</span></div>
            <div class="panel"><span>PG</span></div>
            <div class="panel"><span>MEGASIZE</span></div>
          </div>

          <div class="panel"><span>EXPLORE</span></div>
          <div class="panel"><span>ABOUT</span></div>

        </div>
      </div>
    </div>

  </div>
</div>

<script>
const bgImage=document.getElementById('bgImage');
const mainButtons=document.querySelectorAll('.button-container > .panel');

mainButtons.forEach((btn,i)=>{
  btn.style.animation=`flyIn 0.7s forwards ${i*0.15+0.5}s`;
});

function setupDropdown(triggerId, dropdownId){
  const trigger=document.getElementById(triggerId);
  const dropdown=document.getElementById(dropdownId);
  const items=dropdown.querySelectorAll('.panel');
  let open=false;

  trigger.addEventListener('click',()=>{
    open=!open;

    if(open){
      dropdown.classList.add('open');
      dropdown.style.maxHeight=dropdown.scrollHeight+"px";
      items.forEach((item,i)=>{
        item.style.animation=`flyIn 0.4s forwards ${i*0.1}s`;
      });
    } else {
      dropdown.style.maxHeight="0";
      dropdown.classList.remove('open');
      items.forEach(item=>{
        item.style.opacity='0';
      });
    }
  });
}

setupDropdown('scalePanel','scaleDropdown');
setupDropdown('gradesPanel','gradesDropdown');
</script>

</body>
</html>
