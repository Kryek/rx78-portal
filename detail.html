<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Detail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    html, body {
      margin: 0;
      background: black;
      color: white;
      font-family: 'Orbitron', sans-serif;
    }

    .app {
      padding: 20px;
      max-width: 900px;
      margin: auto;

      box-sizing: border-box; /* 🔥 FIX */
    }

    /* NAV */
    .nav {
      position: fixed;
      top: 12px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 1000;
    }

    .nav-btn {
      background: rgba(17,17,17,0.65);
      border: 3px solid white;
      padding: 8px 12px;
      transform: skew(-20deg);
      cursor: pointer;
      width: 80px;
    }

    .nav-btn span {
      display: block;
      transform: skew(20deg);
      font-size: 10px;
      text-align: center;
    }

    .dropdown {
      display: flex;
      flex-direction: column;
      gap: 6px;
      height: 0;
      opacity: 0;
      pointer-events: none;
      overflow: visible;
      padding-bottom: 8px;
    }

    .dropdown.open {
      height: auto;
      opacity: 1;
      pointer-events: auto;
    }

    .dropdown .nav-btn {
      width: 70px;
      padding: 6px 10px;
      transform: skew(-20deg) translateX(-25px);
      opacity: 0;
    }
    /* NAV ENTRY ANIM */
.nav-btn {
  opacity: 0;
  transform: skew(-20deg) translateX(-40px);
}

.nav-btn.show {
  animation: navFlyIn 0.5s ease forwards;
}

@keyframes navFlyIn {
  from {
    opacity: 0;
    transform: skew(-20deg) translateX(-40px);
  }
  to {
    opacity: 1;
    transform: skew(-20deg) translateX(0);
  }
}

    @keyframes flyInDropdown {
      from {
        transform: skew(-20deg) translateX(-35px);
        opacity: 0;
      }
      to {
        transform: skew(-20deg) translateX(0);
        opacity: 1;
      }
    }

    @media (max-width: 600px) {
      /* MOBILE overlay animation base state */
#boxart,
#overview,
#gallery,
#trivia {
  opacity: 0;
  transform: translateY(50px);
}

/* animate in */
#boxart.show,
#overview.show,
#gallery.show,
#trivia.show {
  animation: flyUp 0.6s ease forwards;
}
      /* 🔥 MOBILE LAYOUT FIX */
.detail-body {
  display: flex;
  flex-direction: column;
}

/* flatten wrappers so children can reorder */
.detail-left,
.detail-right {
  display: contents;
}

/* desired order */
#boxart { order: 1; }
#overview { order: 2; }
#gallery { order: 3; }
#trivia { order: 4; }

      #boxart,
  #overview,
  #gallery,
  #trivia {
    opacity: 0;
    transform: translateY(50px);
  }

  #boxart.show,
  #overview.show,
  #gallery.show,
  #trivia.show {
    animation: flyUp 0.6s ease forwards;
  }
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 60px;
        flex-direction: row;
        align-items: center;
        gap: 10px;
        padding: 0 10px;
        background: rgba(0,0,0,0.9);
      }

      body { padding-top: 60px; }

    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);

      flex-direction: column;

    .overlay.open { display: flex; }

    /* reserve space to prevent layout shift */
.title {
  min-height: 28px; /* adjust if needed */
}

.subtitle {
  min-height: 18px;
}

    .title { font-size: 24px; margin-bottom: 10px; }
    .subtitle { font-size: 14px; opacity: 0.7; margin-bottom: 20px; }

    img {
      width: 100%;

    ul { padding-left: 18px; }

#qrDebugBtn {
  position: fixed;
  top: 0;
  right: 0;
  width: 80px;
  height: 80px;
  z-index: 9998;

  /* invisible */
  background: transparent;
}

    /* ============================= */
/* QR ENTRY OVERLAY SYSTEM */
/* ============================= */

#qrEntry {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  clip-path: circle(150% at 50% 50%);
}

.qr-center {
  position: relative;
  width: 220px;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ring {
  position: absolute;
  border: 3px dashed rgba(255,255,255,0.6);
  border-radius: 50%;
  inset: 0;
}

.r1 { animation: spin 6s linear infinite; }
.r2 { inset: 18px; animation: spinReverse 8s linear infinite; opacity: 0.7; }
.r3 { inset: 36px; animation: spin 10s linear infinite; opacity: 0.4; }

.qr-text {
  font-size: 12px;
  letter-spacing: 2px;
  text-align: center;
  transition: opacity 0.4s ease;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes spinReverse {
  from { transform: rotate(360deg); }
  to { transform: rotate(0deg); }
}
.qr-text::after {
  content: "_";
  margin-left: 4px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0; }
}

    /* ✅ DESKTOP FIXED */
    @media (min-width: 768px) {

      html, body {
        height: 100%;
        overflow: hidden;
      }

      .app {
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .detail-header {
        text-align: center;
        flex-shrink: 0;
      }


      .detail-left {
  flex: 0 0 50%;      /* 🔥 don't stretch */
  max-height: 100%;   /* 🔥 allow scroll if needed */
  overflow-y: auto;

  border: 2px solid white;
  padding: 15px;
  box-sizing: border-box;
}

.detail-right {
  flex: 1;
  height: 100%;        /* 🔥 force full height again */
  min-height: 0;
  overflow-y: auto;

  border: 2px solid white;
  padding: 15px;
  box-sizing: border-box;
}
      .detail-body {
  display: flex;
  gap: 30px;

  flex: 1;
  min-height: 0;

  overflow: hidden;

  align-items: flex-start; /* 🔥 THIS is the missing piece */
}
      /* ===== CUSTOM SCROLLBAR (WHITE MINIMAL) ===== */

/* Chrome / Edge / Safari */
.detail-left::-webkit-scrollbar,
.detail-right::-webkit-scrollbar {
  width: 2px; /* thin line */
}

.detail-left::-webkit-scrollbar-track,
.detail-right::-webkit-scrollbar-track {
  background: transparent;
}

.detail-left::-webkit-scrollbar-thumb,
.detail-right::-webkit-scrollbar-thumb {
  background: white;
  border-radius: 10px;
}

/* Firefox */
.detail-left,
.detail-right {
  scrollbar-width: thin;
  scrollbar-color: white transparent;
}
    }
    /* ============================= */
/* DETAIL PAGE ANIMS */
/* ============================= */

/* start hidden */
.detail-left,
.detail-right {
  opacity: 0;
  transform: translateY(50px);
}

/* animate in */
.detail-left.show,
.detail-right.show {
  animation: flyUp 0.6s ease forwards;
}

.detail-right.show {
  animation-delay: 0.15s;
}

@keyframes flyUp {
  from {
    opacity: 0;
    transform: translateY(50px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* title cursor */
#kitTitle.typewriter::after,
#kitSubtitle.typewriter::after {
  content: "_";
  margin-left: 6px;
  animation: blink 1s infinite;
}

/* stop cursor when done */
#kitTitle.done::after,
#kitSubtitle.done::after {
  content: "";
  animation: none;
}
    
#gradesOverlay .nav-btn {
  opacity: 1 !important;
  transform: skew(-20deg) translateX(0) !important;
}

/* Disable text selection */
body, .nav-btn, .panel, .line, .text {
  -webkit-user-select: none; /* iOS Safari */
  -ms-user-select: none;     /* old Edge */
  user-select: none;         /* standard */
}

/* Optional: remove tap highlight on mobile */
* {
  -webkit-tap-highlight-color: transparent;
}

</head>

<body>

<div id="qrDebugBtn"></div>
  
<!-- QR OVERLAY -->
<div id="qrEntry" style="display:none;">
  <div class="qr-center">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
    <div class="qr-text" id="qrText">QR AUTHENTICATED</div>
  </div>
</div>

<div class="nav">
  <div class="nav-btn" id="homeBtn"><span>HOME</span></div>
  <div class="nav-btn" id="gradesBtn"><span>KITS</span></div>

  <div class="dropdown" id="gradesDropdown">
    <div class="nav-btn" data-grade="SD & Gashapon"><span>SD</span></div>
    <div class="nav-btn" data-grade="EG & 1/144"><span>EG</span></div>
    <div class="nav-btn" data-grade="HG"><span>HG</span></div>
    <div class="nav-btn" data-grade="MG & 1/100"><span>MG</span></div>
    <div class="nav-btn" data-grade="RG"><span>RG</span></div>
    <div class="nav-btn" data-grade="PG"><span>PG</span></div>
    <div class="nav-btn" data-grade="MEGASIZE"><span>MEGA</span></div>
    <div class="nav-btn"><span>MISC</span></div>
    <div class="nav-btn"><span>CUSTOM</span></div>
  </div>
</div>

<div class="overlay" id="gradesOverlay">
  <div class="nav-btn" data-grade="SD & Gashapon"><span>SD</span></div>
    <div class="nav-btn" data-grade="EG & 1/144"><span>EG</span></div>
    <div class="nav-btn" data-grade="HG"><span>HG</span></div>
    <div class="nav-btn" data-grade="MG & 1/100"><span>MG</span></div>
    <div class="nav-btn" data-grade="RG"><span>RG</span></div>
    <div class="nav-btn" data-grade="PG"><span>PG</span></div>
    <div class="nav-btn" data-grade="MEGASIZE"><span>MEGA</span></div>
  <div class="nav-btn"><span>MISC</span></div>
  <div class="nav-btn"><span>CUSTOM</span></div>
</div>

<div class="app">

  <div class="detail-header">
    <div class="title" id="kitTitle"></div>
    <div class="subtitle" id="kitSubtitle"></div>
  </div>

  <div class="detail-body">

    <div class="detail-left">
      <div id="overview"></div>
      <div id="trivia"></div>
    </div>

    <div class="detail-right">
      <div id="boxart"></div>
      <div class="gallery" id="gallery"></div>
    </div>

  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const grade = params.get("grade");
const id = params.get("id");

if (!grade || !id) window.location.href = "index.html";

const gradeMap = {
  EG: "eg-kits.json",
  HG: "hg-kits.json",
  MG: "mg-kits.json",
  RG: "rg-kits.json",
  PG: "pg-kits.json",
  SD: "sd-kits.json",
  MEGASIZE: "megasize-kits.json",
  MISC: "misc-kits.json",
  CUSTOM: "custom-kits.json"
};

const file = gradeMap[grade];
if (!file) window.location.href = "index.html";

const kitPath = `kits/${grade.toLowerCase()}/${id}/`;

/* KIT DATA */
fetch(`data/${file}`)
  .then(res => res.json())
  .then(data => {
    const kit = data.kits.find(k => k.id === id);
    if (!kit) return window.location.href = "index.html";

    const titleEl = document.getElementById("kitTitle");
const subEl = document.getElementById("kitSubtitle");

titleEl.dataset.text = kit.name;
subEl.dataset.text = `${kit.mold} • ${kit.variant} • ${kit.year}`;

// keep empty initially to prevent flash
titleEl.textContent = "";
subEl.textContent = "";
  });

/* CONTENT SPLIT */
fetch(kitPath + "content.html")
  .then(res => res.text())
  .then(html => {
    const temp = document.createElement("div");
    temp.innerHTML = html;

    const sections = temp.querySelectorAll(".section");

    sections.forEach(section => {
      const title = section.querySelector("h2")?.textContent;

      if (title?.toLowerCase().includes("overview")) {
        document.getElementById("overview").appendChild(section);
      } else {
        document.getElementById("trivia").appendChild(section);
      }
    });
  });

/* IMAGES */
const box = document.createElement("img");
box.src = kitPath + "images/box.jpg";
document.getElementById("boxart").appendChild(box);

let index = 1;
function loadNextImage() {
  const img = new Image();
  img.src = kitPath + "images/" + index + ".jpg";

  img.onload = () => {
    document.getElementById("gallery").appendChild(img);
    index++;
    loadNextImage();
  };
}
loadNextImage();

/* NAV */
document.getElementById("homeBtn").onclick = () => {
  window.location.href = "index.html";
};

const gradesBtn = document.getElementById("gradesBtn");
const dropdown = document.getElementById("gradesDropdown");
const overlay = document.getElementById("gradesOverlay");

gradesBtn.onclick = () => {
  if (window.innerWidth <= 600) {
    overlay.classList.add("open");
    document.body.style.overflow = "hidden";
  } else {
    const isOpen = dropdown.classList.toggle("open");

    if (isOpen) {
      const items = dropdown.querySelectorAll(".nav-btn");
      items.forEach((item, i) => {
        item.style.animation = "none";
        item.offsetHeight;
        item.style.animation = `flyInDropdown 0.35s forwards ${i * 0.08}s`;
      });
    }
  }
};

overlay.addEventListener("click", (e) => {
  // only close if clicking outside buttons
  if (e.target === overlay) {
    overlay.classList.remove("open");
    document.body.style.overflow = "";
  }
});

document.querySelectorAll("[data-grade]").forEach(btn => {
  btn.onclick = () => {
    const g = btn.getAttribute("data-grade");
    window.location.href = `kits.html?grade=${g}`;
  };
});

/* ============================= */
/* QR SYSTEM (SAFE ADD-ON ONLY) */
/* ============================= */
document.addEventListener("DOMContentLoaded", () => {
  const fromQR = new URLSearchParams(window.location.search).get("src") === "qr";
  if (!fromQR) {
  // no QR → just run page anim normally
  setTimeout(startDetailAnimations, 300);
  return;
}

  const overlay = document.getElementById("qrEntry");
  const text = document.getElementById("qrText");

  if (!overlay || !text) return;

  overlay.style.display = "flex";

  const sequence = [
    "QR AUTHENTICATED",
    "ACCESS GRANTED",
    "ENTRY LOADED"
  ];

  let lineIndex = 0;

  function typeLine(line, callback) {
    let i = 0;
    text.textContent = "";

    const typing = setInterval(() => {
      text.textContent += line[i];
      i++;

      if (i >= line.length) {
        clearInterval(typing);

        setTimeout(() => deleteLine(callback), 800); // pause before delete
      }
    }, 60); // typing speed
  }

  function deleteLine(callback) {
    let current = text.textContent;

    const deleting = setInterval(() => {
      current = current.slice(0, -1);
      text.textContent = current;

      if (current.length === 0) {
        clearInterval(deleting);
        callback();
      }
    }, 20); // delete speed
  }

  function nextLine() {
    lineIndex++;

    if (lineIndex < sequence.length) {
      typeLine(sequence[lineIndex], nextLine);
    } else {
      finishSequence();
    }
  }

  function finishSequence() {
  text.style.opacity = "0";

  overlay.style.transition = "clip-path 1.2s ease";
  overlay.style.clipPath = "circle(0% at 50% 50%)";

  setTimeout(() => {
    overlay.remove();

    // 🔥 trigger page animations AFTER QR finishes
    if (window.startDetailAnimations) {
      window.startDetailAnimations();
    }

  }, 1300);
}

  // start
  typeLine(sequence[0], nextLine);
});
  /* ============================= */
/* DETAIL PAGE ENTRY ANIM */
/* ============================= */

function startDetailAnimations() {

  const left = document.querySelector(".detail-left");
  const right = document.querySelector(".detail-right");
  const title = document.getElementById("kitTitle");
  const subtitle = document.getElementById("kitSubtitle");

  if (!title || !subtitle) return;

  const titleText = title.dataset.text || "";
  const subText = subtitle.dataset.text || "";

  function typeElement(el, text, speed, callback) {
    let i = 0;
    el.textContent = "";
    el.classList.add("typewriter");

    function type() {
      if (i < text.length) {
        el.textContent += text[i];
        i++;
        setTimeout(type, speed);
      } else {
        el.classList.remove("typewriter");
        el.classList.add("done");
        if (callback) callback();
      }
    }

    type();
  }

  // 🔥 SEQUENCE
  typeElement(title, titleText, 50, () => {
    setTimeout(() => {
      typeElement(subtitle, subText, 30, () => {

        // 👉 ONLY after BOTH finish → animate boxes
        if (window.innerWidth <= 600) {
  // 📱 MOBILE → animate sections
  const sections = [
    document.getElementById("boxart"),
    document.getElementById("overview"),
    document.getElementById("gallery"),
    document.getElementById("trivia")
  ];

  sections.forEach((el, i) => {
    if (!el) return;
    setTimeout(() => {
      el.classList.add("show");
    }, i * 150);
  });

} else {
  // 💻 DESKTOP → keep original behavior
  if (left) left.classList.add("show");
  if (right) right.classList.add("show");
}

// wait for box animation to finish, then nav
setTimeout(() => {
  animateNav();
}, 500);

      });
    }, 200);
  });
}

  function animateNav() {
  const buttons = document.querySelectorAll(".nav > .nav-btn");

  buttons.forEach((btn, i) => {
    setTimeout(() => {
      btn.classList.add("show");
    }, i * 100); // stagger
  });
}

document.getElementById("qrDebugBtn").addEventListener("click", () => {
  const params = new URLSearchParams(window.location.search);

  const grade = params.get("grade");
  const id = params.get("id");

  if (!grade || !id) return;

  window.location.href = `detail.html?grade=${grade}&id=${id}&src=qr`;
});

</script>
