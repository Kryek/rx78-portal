<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Detail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    html, body {
      margin: 0;
      background: black;
      color: white;
      font-family: 'Orbitron', sans-serif;
    }

    .app {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .title {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    img {
      width: 100%;
      margin-bottom: 10px;
      border: 2px solid white;
    }

    .gallery img {
      margin-top: 10px;
    }

    .section {
      margin-top: 25px;
    }

    h2 {
      font-size: 16px;
      border-bottom: 2px solid white;
      padding-bottom: 5px;
      margin-bottom: 10px;
    }

    ul {
      padding-left: 18px;
    }

    /* ✅ NAV */
    #navContainer {
      position: fixed;
      top: 12px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 20;
    }

    .navBtn {
      background: rgba(17,17,17,0.65);
      border: 3px solid white;
      padding: 8px 12px;
      transform: skew(-20deg);
      cursor: pointer;
    }

    .navBtn span {
      display: block;
      transform: skew(20deg);
      font-size: 10px;
      text-align: center;
    }

    @media (max-width:600px){
      #navContainer {
        flex-direction: row;
        top: 10px;
        left: 10px;
      }
    }

    /* ✅ OVERLAY */
    #gradesOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 50;
    }

    #gradesOverlay.open {
      opacity: 1;
      pointer-events: all;
    }

    #closeOverlay {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 24px;
      cursor: pointer;
    }

    .overlayMenu {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .overlayItem {
      font-size: 18px;
      border: 2px solid white;
      padding: 10px 20px;
      text-align: center;
      cursor: pointer;
    }

  </style>
</head>
<body>

<!-- ✅ NAV -->
<div id="navContainer">
  <div class="navBtn" id="homeBtn"><span>HOME</span></div>
  <div class="navBtn" id="gradesBtn"><span>GRADES</span></div>
</div>

<!-- ✅ OVERLAY -->
<div id="gradesOverlay">
  <div id="closeOverlay">✕</div>

  <div class="overlayMenu">
    <div class="overlayItem" data-grade="SD">SD</div>
    <div class="overlayItem" data-grade="HG">HG</div>
    <div class="overlayItem" data-grade="RG">RG</div>
    <div class="overlayItem" data-grade="MG">MG</div>
    <div class="overlayItem" data-grade="PG">PG</div>
    <div class="overlayItem" data-grade="MEGASIZE">MEGA SIZE</div>
    <div class="overlayItem" data-grade="MISC">MISC</div>
    <div class="overlayItem" data-grade="CUSTOM">CUSTOMS</div>
  </div>
</div>

<div class="app">

  <div class="title" id="kitTitle"></div>
  <div class="subtitle" id="kitSubtitle"></div>

  <div id="boxart"></div>
  <div class="gallery" id="gallery"></div>

  <div id="kitContent"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const grade = params.get("grade");
const id = params.get("id");

// ✅ VALIDATION
if (!grade || !id) {
  window.location.href = "index.html";
}

// ✅ MAP GRADE → JSON FILE
const gradeMap = {
  HG: "hg-kits.json",
  MG: "mg-kits.json",
  RG: "rg-kits.json",
  PG: "pg-kits.json",
  SD: "sd-kits.json",
  MEGASIZE: "megasize-kits.json",
  MISC: "misc-kits.json",
  CUSTOM: "custom-kits.json"
};

const file = gradeMap[grade];

if (!file) {
  window.location.href = "index.html";
}

// ✅ BUILD KIT PATH
const kitPath = `kits/${grade.toLowerCase()}/${id}/`;

// ✅ FETCH JSON → FIND KIT
fetch(`data/${file}`)
  .then(res => res.json())
  .then(data => {

    const kit = data.kits.find(k => k.id === id);

    if (!kit) {
      window.location.href = "index.html";
      return;
    }

    // ✅ TITLE
    document.getElementById("kitTitle").textContent = kit.name;

    document.getElementById("kitSubtitle").textContent =
      `${kit.mold} • ${kit.variant} • ${kit.year}`;

  });

// ✅ LOAD CONTENT.HTML
fetch(kitPath + "content.html")
  .then(res => res.text())
  .then(html => {
    document.getElementById("kitContent").innerHTML = html;
  });

// ✅ LOAD IMAGES
const boxartDiv = document.getElementById("boxart");
const galleryDiv = document.getElementById("gallery");

// BOXART
const box = document.createElement("img");
box.src = kitPath + "images/box.jpg";
boxartDiv.appendChild(box);

// AUTO GALLERY
let index = 1;

function loadNextImage() {
  const img = new Image();
  img.src = kitPath + "images/" + index + ".jpg";

  img.onload = () => {
    galleryDiv.appendChild(img);
    index++;
    loadNextImage();
  };

  img.onerror = () => {
    return;
  };
}

loadNextImage();

// ✅ NAV LOGIC

// HOME → back to current grade
document.getElementById("homeBtn").addEventListener("click", () => {
  window.location.href = `kits.html?grade=${grade}`;
});

// OVERLAY
const overlay = document.getElementById("gradesOverlay");

document.getElementById("gradesBtn").addEventListener("click", () => {
  overlay.classList.add("open");
});

document.getElementById("closeOverlay").addEventListener("click", () => {
  overlay.classList.remove("open");
});

// SELECT GRADE
document.querySelectorAll(".overlayItem").forEach(item => {
  item.addEventListener("click", () => {
    const selected = item.getAttribute("data-grade");
    window.location.href = `kits.html?grade=${selected}`;
  });
});
</script>

</body>
</html>
