<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Detail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    html, body {
      margin: 0;
      background: black;
      color: white;
      font-family: 'Orbitron', sans-serif;
      height: 100%;
      overflow: hidden;
    }

    .app {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    /* NAV */
    .nav {
      position: fixed;
      top: 12px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 1000;
      animation: navFlyIn 0.6s ease forwards;
      opacity: 0;
      transform: translateX(-30px);
    }

    @keyframes navFlyIn {
      to { opacity: 1; transform: translateX(0); }
    }

    .nav-btn {
      background: rgba(17,17,17,0.65);
      border: 3px solid white;
      padding: 8px 12px;
      transform: skew(-20deg);
      cursor: pointer;
      width: 80px;
    }

    .nav-btn span {
      display: block;
      transform: skew(20deg);
      font-size: 10px;
      text-align: center;
    }

    /* DROPDOWN */
    .dropdown {
      display: flex;
      flex-direction: column;
      gap: 6px;
      height: 0;
      opacity: 0;
      pointer-events: none;
      overflow: visible;
      padding-bottom: 8px;
    }

    .dropdown.open {
      height: auto;
      opacity: 1;
      pointer-events: auto;
    }

    .dropdown .nav-btn {
      width: 70px;
      padding: 6px 10px;
      transform: skew(-20deg) translateX(-25px);
      opacity: 0;
    }

    @keyframes flyInDropdown {
      from { transform: skew(-20deg) translateX(-35px); opacity: 0; }
      to { transform: skew(-20deg) translateX(0); opacity: 1; }
    }

    /* HEADER */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-top: 40px;
  margin-bottom: 10px;
    }

    .title {
      font-size: 24px;
      margin-bottom: 10px;
      opacity: 0;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0;
    }

    /* LAYOUT */
    .layout {
      display: flex;
      gap: 30px;
      height: calc(100vh - 140px);
      overflow: hidden;
    }

    .text-side {
      flex: 1;
      overflow-y: auto;
      padding-right: 10px;
      scrollbar-width: thin;
    }

    .image-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      padding-right: 10px;
      scrollbar-width: thin;
      animation: imageRise 0.8s ease forwards;
      opacity: 0;
      transform: translateY(40px);
    }

    @keyframes imageRise {
      to { opacity: 1; transform: translateY(0); }
    }

    /* CONTENT ANIMATION FIX */
    .section {
      opacity: 0;
      transform: translateY(25px);
      transition: all 0.6s ease;
    }

    h2 {
      font-size: 16px;
      border-bottom: 2px solid white;
      padding-bottom: 5px;
      margin-bottom: 10px;
    }

    img {
      width: 100%;
      border: 2px solid white;
    }

    @media (max-width: 600px) {
      .layout {
        flex-direction: column;
        height: auto;
        overflow: visible;
      }
    }
  </style>
</head>

<body>

<div class="nav">
  <div class="nav-btn" id="homeBtn"><span>HOME</span></div>
  <div class="nav-btn" id="gradesBtn"><span>GRADES</span></div>

  <div class="dropdown" id="gradesDropdown">
    <div class="nav-btn" data-grade="HG"><span>HG</span></div>
    <div class="nav-btn" data-grade="MG"><span>MG</span></div>
    <div class="nav-btn" data-grade="RG"><span>RG</span></div>
    <div class="nav-btn" data-grade="PG"><span>PG</span></div>
    <div class="nav-btn" data-grade="SD"><span>SD</span></div>
    <div class="nav-btn" data-grade="MEGASIZE"><span>MEGA</span></div>
    <div class="nav-btn"><span>MISC</span></div>
    <div class="nav-btn"><span>CUSTOM</span></div>
  </div>
</div>

<div class="app">

  <div class="header">
    <div class="title" id="kitTitle"></div>
    <div class="subtitle" id="kitSubtitle"></div>
  </div>

  <div class="layout">

    <div class="text-side">
      <div id="overview"></div>
      <div id="trivia"></div>
    </div>

    <div class="image-side">
      <div id="boxart"></div>
      <div id="gallery"></div>
    </div>

  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const grade = params.get("grade");
const id = params.get("id");

if (!grade || !id) window.location.href = "index.html";

const gradeMap = {
  HG: "hg-kits.json",
  MG: "mg-kits.json",
  RG: "rg-kits.json",
  PG: "pg-kits.json",
  SD: "sd-kits.json",
  MEGASIZE: "megasize-kits.json",
  MISC: "misc-kits.json",
  CUSTOM: "custom-kits.json"
};

const file = gradeMap[grade];
const kitPath = `kits/${grade.toLowerCase()}/${id}/`;

/* TYPEWRITER */
function typeText(el, text, speed = 15, cb) {
  el.textContent = "";
  let i = 0;

  (function step() {
    if (i < text.length) {
      el.textContent += text[i++];
      setTimeout(step, speed);
    } else cb?.();
  })();
}

/* HEADER ANIM RESTORED */
fetch(`data/${file}`)
  .then(res => res.json())
  .then(data => {
    const kit = data.kits.find(k => k.id === id);
    if (!kit) return window.location.href = "index.html";

    const title = document.getElementById("kitTitle");
    const subtitle = document.getElementById("kitSubtitle");

    const titleText = kit.name;
    const subtitleText = `${kit.mold} • ${kit.variant} • ${kit.year}`;

    // ✅ HARD RESET VISIBILITY (fixes "invisible forever" bug)
    title.style.opacity = "1";
    subtitle.style.opacity = "1";

    title.textContent = "";
    subtitle.textContent = "";

    function typeText(el, text, speed = 14, cb) {
      let i = 0;

      function step() {
        if (i < text.length) {
          el.textContent += text[i++];
          setTimeout(step, speed);
        } else cb?.();
      }

      step();
    }

    typeText(title, titleText, 18, () => {
      setTimeout(() => {
        typeText(subtitle, subtitleText, 12);
      }, 120);
    });
  });

/* CONTENT ANIM RESTORED */
fetch(kitPath + "content.html")
  .then(res => res.text())
  .then(html => {
    const temp = document.createElement("div");
    temp.innerHTML = html;

    const sections = temp.querySelectorAll(".section");

    sections.forEach((section, i) => {
      const title = section.querySelector("h2")?.textContent || "";

      if (title.toLowerCase().includes("overview")) {
        document.getElementById("overview").appendChild(section);
      } else {
        document.getElementById("trivia").appendChild(section);
      }

      setTimeout(() => {
        section.style.opacity = "1";
        section.style.transform = "translateY(0)";
      }, 200 + i * 120);
    });
  });

/* IMAGES */
const box = document.createElement("img");
box.src = kitPath + "images/box.jpg";
document.getElementById("boxart").appendChild(box);

let index = 1;
function loadNextImage() {
  const img = new Image();
  img.src = kitPath + "images/" + index + ".jpg";

  img.onload = () => {
    document.getElementById("gallery").appendChild(img);
    index++;
    loadNextImage();
  };
}
loadNextImage();

/* NAV */
document.getElementById("homeBtn").onclick = () => {
  window.location.href = "index.html";
};

document.querySelectorAll("[data-grade]").forEach(btn => {
  btn.onclick = () => {
    const g = btn.getAttribute("data-grade");
    if (!g) return;
    window.location.href = `kits.html?grade=${g}`;
  };
});

const gradesBtn = document.getElementById("gradesBtn");
const dropdown = document.getElementById("gradesDropdown");

gradesBtn.onclick = () => {
  const isOpen = dropdown.classList.toggle("open");

  if (isOpen) {
    const items = dropdown.querySelectorAll(".nav-btn");
    items.forEach((item, i) => {
      item.style.animation = "none";
      item.offsetHeight;
      item.style.animation = `flyInDropdown 0.35s forwards ${i * 0.08}s`;
    });
  }
};
</script>

</body>
</html>
