<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Detail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    html, body {
      margin: 0;
      background: black;
      color: white;
      font-family: 'Orbitron', sans-serif;
      height: 100%;

      /* ✅ FIX: allow scrolling globally again */
      overflow: auto;
    }

    .app {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    /* NAV */
    .nav {
      position: fixed;
      top: 12px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 1000;
      animation: navFlyIn 0.6s ease forwards;
      opacity: 0;
      transform: translateX(-30px);
    }

    @keyframes navFlyIn {
      to { opacity: 1; transform: translateX(0); }
    }

    .nav-btn {
      background: rgba(17,17,17,0.65);
      border: 3px solid white;
      padding: 8px 12px;
      transform: skew(-20deg);
      cursor: pointer;
      width: 80px;
    }

    .nav-btn span {
      display: block;
      transform: skew(20deg);
      font-size: 10px;
      text-align: center;
    }

    /* DROPDOWN (desktop stays unchanged) */
    .dropdown {
      display: flex;
      flex-direction: column;
      gap: 6px;
      height: 0;
      opacity: 0;
      pointer-events: none;
      overflow: visible;
      padding-bottom: 8px;
    }

    .dropdown.open {
      height: auto;
      opacity: 1;
      pointer-events: auto;
    }

    .dropdown .nav-btn {
      width: 70px;
      padding: 6px 10px;
      transform: skew(-20deg) translateX(-25px);
      opacity: 0;
    }

    @keyframes flyInDropdown {
      from { transform: skew(-20deg) translateX(-35px); opacity: 0; }
      to { transform: skew(-20deg) translateX(0); opacity: 1; }
    }

    /* HEADER */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-top: 20px;
      margin-bottom: 10px;
    }

    .title {
      font-size: 24px;
      margin-bottom: 10px;
      opacity: 0;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0;
    }

    /* LAYOUT */
    .layout {
      display: flex;
      gap: 30px;
      margin-top: 20px;
      height: calc(100vh - 140px);
      overflow: hidden;
    }

    .text-side {
      flex: 1;
      overflow-y: auto;
      padding-right: 10px;
      scrollbar-width: thin;
    }

    .image-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      padding-right: 10px;
      scrollbar-width: thin;
      animation: imageRise 0.8s ease forwards;
      opacity: 0;
      transform: translateY(40px);
    }

    @keyframes imageRise {
      to { opacity: 1; transform: translateY(0); }
    }

    .section {
      opacity: 0;
      transform: translateY(25px);
      transition: all 0.6s ease;
    }

    h2 {
      font-size: 16px;
      border-bottom: 2px solid white;
      padding-bottom: 5px;
      margin-bottom: 10px;
    }

    img {
      width: 100%;
      border: 2px solid white;
    }

    /* ===================== */
    /* ✅ MOBILE FIX SYSTEM */
    /* ===================== */

    @media (max-width: 600px) {

      /* allow scrolling again */
      html, body {
        overflow: auto;
      }

      .layout {
        flex-direction: column;
        height: auto;
        overflow: visible;
      }

      .text-side,
      .image-side {
        overflow: visible;
      }

      /* top bar nav */
      .nav {
        flex-direction: row;
        top: 0;
        left: 0;
        width: 100%;
        height: 55px;
        align-items: center;
        justify-content: flex-start;
        padding: 0 10px;
        background: rgba(0,0,0,0.9);
      }

      .nav-btn {
        width: auto;
        padding: 6px 14px;
      }
    }

    /* ===================== */
    /* MOBILE OVERLAY */
    /* ===================== */

    .mobile-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .mobile-overlay.open {
      display: flex;
    }

    .mobile-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .close-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 22px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-btn" id="homeBtn"><span>HOME</span></div>
  <div class="nav-btn" id="gradesBtn"><span>GRADES</span></div>

  <div class="dropdown" id="gradesDropdown">
    <div class="nav-btn" data-grade="HG"><span>HG</span></div>
    <div class="nav-btn" data-grade="MG"><span>MG</span></div>
    <div class="nav-btn" data-grade="RG"><span>RG</span></div>
    <div class="nav-btn" data-grade="PG"><span>PG</span></div>
    <div class="nav-btn" data-grade="SD"><span>SD</span></div>
    <div class="nav-btn" data-grade="MEGASIZE"><span>MEGA</span></div>
    <div class="nav-btn"><span>MISC</span></div>
    <div class="nav-btn"><span>CUSTOM</span></div>
  </div>
</div>

<!-- ✅ MOBILE OVERLAY -->
<div class="mobile-overlay" id="mobileOverlay">
  <div class="close-btn" id="closeOverlay">✕</div>

  <div class="mobile-list">
    <div class="nav-btn" data-grade="HG"><span>HG</span></div>
    <div class="nav-btn" data-grade="MG"><span>MG</span></div>
    <div class="nav-btn" data-grade="RG"><span>RG</span></div>
    <div class="nav-btn" data-grade="PG"><span>PG</span></div>
    <div class="nav-btn" data-grade="SD"><span>SD</span></div>
    <div class="nav-btn" data-grade="MEGASIZE"><span>MEGA</span></div>
    <div class="nav-btn"><span>MISC</span></div>
    <div class="nav-btn"><span>CUSTOM</span></div>
  </div>
</div>

<div class="app">

  <div class="header">
    <div class="title" id="kitTitle"></div>
    <div class="subtitle" id="kitSubtitle"></div>
  </div>

  <div class="layout">

    <div class="text-side">
      <div id="overview"></div>
      <div id="trivia"></div>
    </div>

    <div class="image-side">
      <div id="boxart"></div>
      <div id="gallery"></div>
    </div>

  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const grade = params.get("grade");
const id = params.get("id");

if (!grade || !id) window.location.href = "index.html";

const gradeMap = {
  HG: "hg-kits.json",
  MG: "mg-kits.json",
  RG: "rg-kits.json",
  PG: "pg-kits.json",
  SD: "sd-kits.json",
  MEGASIZE: "megasize-kits.json",
  MISC: "misc-kits.json",
  CUSTOM: "custom-kits.json"
};

const file = gradeMap[grade];
const kitPath = `kits/${grade.toLowerCase()}/${id}/`;

/* NAV */
document.getElementById("homeBtn").onclick = () => {
  window.location.href = "index.html";
};

/* DESKTOP DROPDOWN */
const dropdown = document.getElementById("gradesDropdown");
document.getElementById("gradesBtn").onclick = () => {
  const isOpen = dropdown.classList.toggle("open");

  if (isOpen) {
    const items = dropdown.querySelectorAll(".nav-btn");
    items.forEach((item, i) => {
      item.style.animation = "none";
      item.offsetHeight;
      item.style.animation = `flyInDropdown 0.35s forwards ${i * 0.08}s`;
    });
  }
};

/* MOBILE OVERLAY */
const mobileOverlay = document.getElementById("mobileOverlay");
const closeOverlay = document.getElementById("closeOverlay");

document.getElementById("gradesBtn").addEventListener("click", () => {
  if (window.innerWidth <= 600) {
    mobileOverlay.classList.add("open");
    document.body.style.overflow = "hidden";
  }
});

closeOverlay.onclick = () => {
  mobileOverlay.classList.remove("open");
  document.body.style.overflow = "auto";
};

document.querySelectorAll("[data-grade]").forEach(btn => {
  btn.onclick = () => {
    const g = btn.getAttribute("data-grade");
    if (!g) return;
    window.location.href = `kits.html?grade=${g}`;
  };
});

</script>

</body>
</html>
