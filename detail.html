<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Detail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    html, body {
      margin: 0;
      background: black;
      color: white;
      font-family: 'Orbitron', sans-serif;
    }

    .app {
      padding: 20px;
      max-width: 900px;
      margin: auto;

      box-sizing: border-box; /* 🔥 FIX */
    }

    /* NAV */
    .nav {
      position: fixed;
      top: 12px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 1000;
    }

    .nav-btn {
      background: rgba(17,17,17,0.65);
      border: 3px solid white;
      padding: 8px 12px;
      transform: skew(-20deg);
      cursor: pointer;
      width: 80px;
    }

    .nav-btn span {
      display: block;
      transform: skew(20deg);
      font-size: 10px;
      text-align: center;
    }

    .dropdown {
      display: flex;
      flex-direction: column;
      gap: 6px;
      height: 0;
      opacity: 0;
      pointer-events: none;
      overflow: visible;
      padding-bottom: 8px;
    }

    .dropdown.open {
      height: auto;
      opacity: 1;
      pointer-events: auto;
    }

    .dropdown .nav-btn {
      width: 70px;
      padding: 6px 10px;
      transform: skew(-20deg) translateX(-25px);
      opacity: 0;
    }

    @keyframes flyInDropdown {
      from {
        transform: skew(-20deg) translateX(-35px);
        opacity: 0;
      }
      to {
        transform: skew(-20deg) translateX(0);
        opacity: 1;
      }
    }

    @media (max-width: 600px) {
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 60px;
        flex-direction: row;
        align-items: center;
        gap: 10px;
        padding: 0 10px;
        background: rgba(0,0,0,0.9);
      }

      body { padding-top: 60px; }
      .app { padding-top: 20px; }
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .overlay.open { display: flex; }

    .overlay .nav-btn {
      margin: 10px 0;
      width: 160px;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 18px;
      cursor: pointer;
    }

    .title { font-size: 24px; margin-bottom: 10px; }
    .subtitle { font-size: 14px; opacity: 0.7; margin-bottom: 20px; }

    img {
      width: 100%;
      margin-bottom: 10px;
      border: 2px solid white;
    }

    .section { margin-top: 25px; }

    h2 {
      font-size: 16px;
      border-bottom: 2px solid white;
      padding-bottom: 5px;
      margin-bottom: 10px;
    }

    ul { padding-left: 18px; }

    /* ============================= */
/* QR ENTRY OVERLAY SYSTEM */
/* ============================= */

#qrEntry {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  clip-path: circle(150% at 50% 50%);
}

.qr-center {
  position: relative;
  width: 220px;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ring {
  position: absolute;
  border: 3px dashed rgba(255,255,255,0.6);
  border-radius: 50%;
  inset: 0;
}

.r1 { animation: spin 6s linear infinite; }
.r2 { inset: 18px; animation: spinReverse 8s linear infinite; opacity: 0.7; }
.r3 { inset: 36px; animation: spin 10s linear infinite; opacity: 0.4; }

.qr-text {
  font-size: 12px;
  letter-spacing: 2px;
  text-align: center;
  transition: opacity 0.4s ease;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes spinReverse {
  from { transform: rotate(360deg); }
  to { transform: rotate(0deg); }
}
.qr-text::after {
  content: "_";
  margin-left: 4px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0; }
}

    /* ✅ DESKTOP FIXED */
    @media (min-width: 768px) {

      html, body {
        height: 100%;
        overflow: hidden;
      }

      .app {
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .detail-header {
        text-align: center;
        flex-shrink: 0;
      }


      .detail-left {
  flex: 0 0 50%;      /* 🔥 don't stretch */
  max-height: 100%;   /* 🔥 allow scroll if needed */
  overflow-y: auto;

  border: 2px solid white;
  padding: 15px;
  box-sizing: border-box;
}

.detail-right {
  flex: 1;
  height: 100%;        /* 🔥 force full height again */
  min-height: 0;
  overflow-y: auto;

  border: 2px solid white;
  padding: 15px;
  box-sizing: border-box;
}
      .detail-body {
  display: flex;
  gap: 30px;

  flex: 1;
  min-height: 0;

  overflow: hidden;

  align-items: flex-start; /* 🔥 THIS is the missing piece */
}
      /* ===== CUSTOM SCROLLBAR (WHITE MINIMAL) ===== */

/* Chrome / Edge / Safari */
.detail-left::-webkit-scrollbar,
.detail-right::-webkit-scrollbar {
  width: 2px; /* thin line */
}

.detail-left::-webkit-scrollbar-track,
.detail-right::-webkit-scrollbar-track {
  background: transparent;
}

.detail-left::-webkit-scrollbar-thumb,
.detail-right::-webkit-scrollbar-thumb {
  background: white;
  border-radius: 10px;
}

/* Firefox */
.detail-left,
.detail-right {
  scrollbar-width: thin;
  scrollbar-color: white transparent;
}
    }
  </style>
</head>

<body>

<!-- QR OVERLAY -->
<div id="qrEntry" style="display:none;">
  <div class="qr-center">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
    <div class="qr-text" id="qrText">QR AUTHENTICATED</div>
  </div>
</div>

<div class="nav">
  <div class="nav-btn" id="homeBtn"><span>HOME</span></div>
  <div class="nav-btn" id="gradesBtn"><span>KITS</span></div>

  <div class="dropdown" id="gradesDropdown">
    <div class="nav-btn" data-grade="HG"><span>HG</span></div>
    <div class="nav-btn" data-grade="MG"><span>MG</span></div>
    <div class="nav-btn" data-grade="RG"><span>RG</span></div>
    <div class="nav-btn" data-grade="PG"><span>PG</span></div>
    <div class="nav-btn" data-grade="SD"><span>SD</span></div>
    <div class="nav-btn" data-grade="MEGASIZE"><span>MEGA</span></div>
    <div class="nav-btn"><span>MISC</span></div>
    <div class="nav-btn"><span>CUSTOM</span></div>
  </div>
</div>

<div class="overlay" id="gradesOverlay">
  <div class="close-btn" id="closeOverlay">✕</div>
  <div class="nav-btn" data-grade="HG"><span>HG</span></div>
  <div class="nav-btn" data-grade="MG"><span>MG</span></div>
  <div class="nav-btn" data-grade="RG"><span>RG</span></div>
  <div class="nav-btn" data-grade="PG"><span>PG</span></div>
  <div class="nav-btn" data-grade="SD"><span>SD</span></div>
  <div class="nav-btn" data-grade="MEGASIZE"><span>MEGA</span></div>
  <div class="nav-btn"><span>MISC</span></div>
  <div class="nav-btn"><span>CUSTOM</span></div>
</div>

<div class="app">

  <div class="detail-header">
    <div class="title" id="kitTitle"></div>
    <div class="subtitle" id="kitSubtitle"></div>
  </div>

  <div class="detail-body">

    <div class="detail-left">
      <div id="overview"></div>
      <div id="trivia"></div>
    </div>

    <div class="detail-right">
      <div id="boxart"></div>
      <div class="gallery" id="gallery"></div>
    </div>

  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const grade = params.get("grade");
const id = params.get("id");

if (!grade || !id) window.location.href = "index.html";

const gradeMap = {
  HG: "hg-kits.json",
  MG: "mg-kits.json",
  RG: "rg-kits.json",
  PG: "pg-kits.json",
  SD: "sd-kits.json",
  MEGASIZE: "megasize-kits.json",
  MISC: "misc-kits.json",
  CUSTOM: "custom-kits.json"
};

const file = gradeMap[grade];
if (!file) window.location.href = "index.html";

const kitPath = `kits/${grade.toLowerCase()}/${id}/`;

/* KIT DATA */
fetch(`data/${file}`)
  .then(res => res.json())
  .then(data => {
    const kit = data.kits.find(k => k.id === id);
    if (!kit) return window.location.href = "index.html";

    document.getElementById("kitTitle").textContent = kit.name;
    document.getElementById("kitSubtitle").textContent =
      `${kit.mold} • ${kit.variant} • ${kit.year}`;
  });

/* CONTENT SPLIT */
fetch(kitPath + "content.html")
  .then(res => res.text())
  .then(html => {
    const temp = document.createElement("div");
    temp.innerHTML = html;

    const sections = temp.querySelectorAll(".section");

    sections.forEach(section => {
      const title = section.querySelector("h2")?.textContent;

      if (title?.toLowerCase().includes("overview")) {
        document.getElementById("overview").appendChild(section);
      } else {
        document.getElementById("trivia").appendChild(section);
      }
    });
  });

/* IMAGES */
const box = document.createElement("img");
box.src = kitPath + "images/box.jpg";
document.getElementById("boxart").appendChild(box);

let index = 1;
function loadNextImage() {
  const img = new Image();
  img.src = kitPath + "images/" + index + ".jpg";

  img.onload = () => {
    document.getElementById("gallery").appendChild(img);
    index++;
    loadNextImage();
  };
}
loadNextImage();

/* NAV */
document.getElementById("homeBtn").onclick = () => {
  window.location.href = "index.html";
};

const gradesBtn = document.getElementById("gradesBtn");
const dropdown = document.getElementById("gradesDropdown");
const overlay = document.getElementById("gradesOverlay");

gradesBtn.onclick = () => {
  if (window.innerWidth <= 600) {
    overlay.classList.add("open");
    document.body.style.overflow = "hidden";
  } else {
    const isOpen = dropdown.classList.toggle("open");

    if (isOpen) {
      const items = dropdown.querySelectorAll(".nav-btn");
      items.forEach((item, i) => {
        item.style.animation = "none";
        item.offsetHeight;
        item.style.animation = `flyInDropdown 0.35s forwards ${i * 0.08}s`;
      });
    }
  }
};

document.getElementById("closeOverlay").onclick = () => {
  overlay.classList.remove("open");
  document.body.style.overflow = "";
};

document.querySelectorAll("[data-grade]").forEach(btn => {
  btn.onclick = () => {
    const g = btn.getAttribute("data-grade");
    window.location.href = `kits.html?grade=${g}`;
  };
});

/* ============================= */
/* QR SYSTEM (SAFE ADD-ON ONLY) */
/* ============================= */
document.addEventListener("DOMContentLoaded", () => {
  const fromQR = new URLSearchParams(window.location.search).get("src") === "qr";
  if (!fromQR) return;

  const overlay = document.getElementById("qrEntry");
  const text = document.getElementById("qrText");

  if (!overlay || !text) return;

  overlay.style.display = "flex";

  const sequence = [
    "QR AUTHENTICATED",
    "ACCESS GRANTED",
    "ENTRY LOADED"
  ];

  let lineIndex = 0;

  function typeLine(line, callback) {
    let i = 0;
    text.textContent = "";

    const typing = setInterval(() => {
      text.textContent += line[i];
      i++;

      if (i >= line.length) {
        clearInterval(typing);

        setTimeout(() => deleteLine(callback), 800); // pause before delete
      }
    }, 60); // typing speed
  }

  function deleteLine(callback) {
    let current = text.textContent;

    const deleting = setInterval(() => {
      current = current.slice(0, -1);
      text.textContent = current;

      if (current.length === 0) {
        clearInterval(deleting);
        callback();
      }
    }, 20); // delete speed
  }

  function nextLine() {
    lineIndex++;

    if (lineIndex < sequence.length) {
      typeLine(sequence[lineIndex], nextLine);
    } else {
      finishSequence();
    }
  }

  function finishSequence() {
    text.style.opacity = "0";

    overlay.style.transition = "clip-path 1.2s ease";
    overlay.style.clipPath = "circle(0% at 50% 50%)";

    setTimeout(() => overlay.remove(), 1300);
  }

  // start
  typeLine(sequence[0], nextLine);
});
</script>

</body>
</html>
