<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Detail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    html, body {
      margin: 0;
      background: black;
      color: white;
      font-family: 'Orbitron', sans-serif;
    }

    .app {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    /* ✅ NAV */
    .nav {
      position: fixed;
      top: 12px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 1000;
    }

    .nav-btn {
      background: rgba(17,17,17,0.65);
      border: 3px solid white;
      padding: 8px 12px;
      transform: skew(-20deg);
      cursor: pointer;
      width: 80px;
    }

    .nav-btn span {
      display: block;
      transform: skew(20deg);
      font-size: 10px;
      text-align: center;
    }

    .dropdown {
      display: flex;
      flex-direction: column;
      gap: 6px;
      height: 0;
      opacity: 0;
      pointer-events: none;
      overflow: visible;
      padding-bottom: 8px;
    }

    .dropdown.open {
      height: auto;
      opacity: 1;
      pointer-events: auto;
    }

    .dropdown .nav-btn {
      width: 70px;
      padding: 6px 10px;
      transform: skew(-20deg) translateX(-25px);
      opacity: 0;
    }

    @keyframes flyInDropdown {
      from {
        transform: skew(-20deg) translateX(-35px);
        opacity: 0;
      }
      to {
        transform: skew(-20deg) translateX(0);
        opacity: 1;
      }
    }

    /* ✅ MOBILE NAV */
    @media (max-width: 600px) {
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 60px;
        flex-direction: row;
        align-items: center;
        justify-content: flex-start;
        gap: 10px;
        padding: 0 10px;
        background: rgba(0,0,0,0.9);
      }

      body { padding-top: 60px; }
      .app { padding-top: 20px; }

      .nav-btn { width: 80px; }
    }

    /* OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .overlay.open { display: flex; }

    .overlay .nav-btn {
      margin: 10px 0;
      width: 160px;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 18px;
      cursor: pointer;
    }

    .title { font-size: 24px; margin-bottom: 10px; }
    .subtitle { font-size: 14px; opacity: 0.7; margin-bottom: 20px; }

    img {
      width: 100%;
      margin-bottom: 10px;
      border: 2px solid white;
    }

    .section { margin-top: 25px; }

    h2 {
      font-size: 16px;
      border-bottom: 2px solid white;
      padding-bottom: 5px;
      margin-bottom: 10px;
    }

    ul { padding-left: 18px; }

    /* ✅ BASE (mobile safe) */
    .detail-container {
      display: block;
    }

    /* ✅ DESKTOP ONLY */
    @media (min-width: 768px) {

      html, body {
        height: 100%;
        overflow: hidden;
      }

      .app {
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .detail-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr;
        gap: 20px 40px;
        height: 100%;
        overflow: hidden;
      }

      .detail-header {
        grid-column: 1 / -1;
        text-align: center;
      }

      /* ✅ FIXED SCROLL + CONTAINMENT */
      .detail-left,
      .detail-right {
        border: 2px solid white;
        padding: 15px;
        padding-bottom: 25px;
        box-sizing: border-box;

        overflow-y: auto;
        min-height: 0;
      }

      .detail-right img {
        width: 100%;
        height: auto;
        margin-bottom: 15px;
      }
    }
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-btn" id="homeBtn"><span>HOME</span></div>
  <div class="nav-btn" id="gradesBtn"><span>KITS</span></div>

  <div class="dropdown" id="gradesDropdown">
    <div class="nav-btn" data-grade="HG"><span>HG</span></div>
    <div class="nav-btn" data-grade="MG"><span>MG</span></div>
    <div class="nav-btn" data-grade="RG"><span>RG</span></div>
    <div class="nav-btn" data-grade="PG"><span>PG</span></div>
    <div class="nav-btn" data-grade="SD"><span>SD</span></div>
    <div class="nav-btn" data-grade="MEGASIZE"><span>MEGA</span></div>
    <div class="nav-btn" data-grade="MISC"><span>MISC</span></div>
    <div class="nav-btn" data-grade="CUSTOM"><span>CUSTOM</span></div>
  </div>
</div>

<!-- MOBILE OVERLAY -->
<div class="overlay" id="gradesOverlay">
  <div class="close-btn" id="closeOverlay">✕</div>

  <div class="nav-btn" data-grade="HG"><span>HG</span></div>
  <div class="nav-btn" data-grade="MG"><span>MG</span></div>
  <div class="nav-btn" data-grade="RG"><span>RG</span></div>
  <div class="nav-btn" data-grade="PG"><span>PG</span></div>
  <div class="nav-btn" data-grade="SD"><span>SD</span></div>
  <div class="nav-btn" data-grade="MEGASIZE"><span>MEGA</span></div>
  <div class="nav-btn" data-grade="MISC"><span>MISC</span></div>
  <div class="nav-btn" data-grade="CUSTOM"><span>CUSTOM</span></div>
</div>

<div class="app">

  <div class="detail-container">

    <div class="detail-header">
      <div class="title" id="kitTitle"></div>
      <div class="subtitle" id="kitSubtitle"></div>
    </div>

    <div class="detail-left">
      <div id="overview"></div>
      <div id="trivia"></div>
    </div>

    <div class="detail-right">
      <div id="boxart"></div>
      <div class="gallery" id="gallery"></div>
    </div>

  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const grade = params.get("grade");
const id = params.get("id");

if (!grade || !id) window.location.href = "index.html";

const gradeMap = {
  HG: "hg-kits.json",
  MG: "mg-kits.json",
  RG: "rg-kits.json",
  PG: "pg-kits.json",
  SD: "sd-kits.json",
  MEGASIZE: "megasize-kits.json",
  MISC: "misc-kits.json",
  CUSTOM: "custom-kits.json"
};

const file = gradeMap[grade];
if (!file) window.location.href = "index.html";

const kitPath = `kits/${grade.toLowerCase()}/${id}/`;

/* KIT DATA */
fetch(`data/${file}`)
  .then(res => res.json())
  .then(data => {
    const kit = data.kits.find(k => k.id === id);
    if (!kit) return window.location.href = "index.html";

    document.getElementById("kitTitle").textContent = kit.name;
    document.getElementById("kitSubtitle").textContent =
      `${kit.mold} • ${kit.variant} • ${kit.year}`;
  });

/* CONTENT SPLIT */
fetch(kitPath + "content.html")
  .then(res => res.text())
  .then(html => {
    const temp = document.createElement("div");
    temp.innerHTML = html;

    const sections = temp.querySelectorAll(".section");

    sections.forEach(section => {
      const title = section.querySelector("h2")?.textContent;

      if (title?.toLowerCase().includes("overview")) {
        document.getElementById("overview").appendChild(section);
      } else {
        document.getElementById("trivia").appendChild(section);
      }
    });
  });

/* IMAGES */
const box = document.createElement("img");
box.src = kitPath + "images/box.jpg";
document.getElementById("boxart").appendChild(box);

let index = 1;
function loadNextImage() {
  const img = new Image();
  img.src = kitPath + "images/" + index + ".jpg";

  img.onload = () => {
    document.getElementById("gallery").appendChild(img);
    index++;
    loadNextImage();
  };
}
loadNextImage();

/* NAV */
document.getElementById("homeBtn").onclick = () => {
  window.location.href = "index.html";
};

const gradesBtn = document.getElementById("gradesBtn");
const dropdown = document.getElementById("gradesDropdown");
const overlay = document.getElementById("gradesOverlay");

gradesBtn.onclick = () => {
  if (window.innerWidth <= 600) {
    overlay.classList.add("open");
    document.body.style.overflow = "hidden";
  } else {
    const isOpen = dropdown.classList.toggle("open");

    if (isOpen) {
      const items = dropdown.querySelectorAll(".nav-btn");
      items.forEach((item, i) => {
        item.style.animation = "none";
        item.offsetHeight;
        item.style.animation = `flyInDropdown 0.35s forwards ${i * 0.08}s`;
      });
    }
  }
};

document.getElementById("closeOverlay").onclick = () => {
  overlay.classList.remove("open");
  document.body.style.overflow = "";
};

document.querySelectorAll("[data-grade]").forEach(btn => {
  btn.onclick = () => {
    const g = btn.getAttribute("data-grade");
    window.location.href = `kits.html?grade=${g}`;
  };
});
</script>

</body>
</html>
