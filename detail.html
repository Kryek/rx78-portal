<script>
const params = new URLSearchParams(window.location.search);
const grade = params.get("grade");
const id = params.get("id");

if (!grade || !id) window.location.href = "index.html";

const gradeMap = {
  HG: "hg-kits.json",
  MG: "mg-kits.json",
  RG: "rg-kits.json",
  PG: "pg-kits.json",
  SD: "sd-kits.json",
  MEGASIZE: "megasize-kits.json",
  MISC: "misc-kits.json",
  CUSTOM: "custom-kits.json"
};

const file = gradeMap[grade];
if (!file) window.location.href = "index.html";

const kitPath = `kits/${grade.toLowerCase()}/${id}/`;

/* TYPEWRITER CORE */
function typeText(el, text, speed = 18, callback) {
  el.textContent = "";
  let i = 0;

  function tick() {
    if (i < text.length) {
      el.textContent += text.charAt(i);
      i++;
      setTimeout(tick, speed);
    } else if (callback) {
      callback();
    }
  }

  tick();
}

/* DATA */
fetch(`data/${file}`)
  .then(res => res.json())
  .then(data => {
    const kit = data.kits.find(k => k.id === id);
    if (!kit) return window.location.href = "index.html";

    typeText(
      document.getElementById("kitTitle"),
      kit.name,
      20,
      () => {
        typeText(
          document.getElementById("kitSubtitle"),
          `${kit.mold} • ${kit.variant} • ${kit.year}`,
          12
        );
      }
    );
  });

/* CONTENT */
fetch(kitPath + "content.html")
  .then(res => res.text())
  .then(html => {
    const temp = document.createElement("div");
    temp.innerHTML = html;

    const sections = temp.querySelectorAll(".section");

    sections.forEach((section, idx) => {
      const title = section.querySelector("h2")?.textContent;

      const target = title?.toLowerCase().includes("overview")
        ? document.getElementById("overview")
        : document.getElementById("trivia");

      // wrap for staggered typing effect
      const wrapper = document.createElement("div");
      wrapper.style.opacity = "0";
      wrapper.style.transform = "translateY(10px)";
      wrapper.style.animation = `fadeInSection 0.4s ease forwards ${idx * 0.15}s`;

      wrapper.appendChild(section);
      target.appendChild(wrapper);
    });
  });

/* FADE FOR TEXT SECTIONS */
const style = document.createElement("style");
style.innerHTML = `
@keyframes fadeInSection {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}`;
document.head.appendChild(style);

/* IMAGES */
const box = document.createElement("img");
box.src = kitPath + "images/box.jpg";
document.getElementById("boxart").appendChild(box);

let index = 1;
function loadNextImage() {
  const img = new Image();
  img.src = kitPath + "images/" + index + ".jpg";

  img.onload = () => {
    document.getElementById("gallery").appendChild(img);
    index++;
    loadNextImage();
  };
}
loadNextImage();

/* NAV */
document.getElementById("homeBtn").onclick = () => {
  window.location.href = "index.html";
};

const gradesBtn = document.getElementById("gradesBtn");
const dropdown = document.getElementById("gradesDropdown");

gradesBtn.onclick = () => {
  const isOpen = dropdown.classList.toggle("open");

  if (isOpen) {
    const items = dropdown.querySelectorAll(".nav-btn");
    items.forEach((item, i) => {
      item.style.animation = "none";
      item.offsetHeight;
      item.style.animation = `flyInDropdown 0.35s forwards ${i * 0.08}s`;
    });
  }
};
</script>
