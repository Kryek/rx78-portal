<script>
const params = new URLSearchParams(window.location.search);
const grade = params.get("grade") || "HG";

const gradeMap = {
  HG: { title: "HIGH GRADE", file: "hg-kits.json" },
  MG: { title: "MASTER GRADE", file: "mg-kits.json" },
  RG: { title: "REAL GRADE", file: "rg-kits.json" },
  PG: { title: "PERFECT GRADE", file: "pg-kits.json" },
  SD: { title: "SUPER DEFORMED", file: "sd-kits.json" },
  MEGASIZE: { title: "MEGA SIZE MODEL", file: "megasize-kits.json" }
};

const current = gradeMap[grade] || gradeMap["HG"];

const bg = document.getElementById('bgImage');
const kitList = document.getElementById('kitList');
const homeBtn = document.getElementById('homeBtn');
const pageTitle = document.querySelector('#pageTitle span');
const searchWrapper = document.getElementById('searchBarWrapper');
const searchBar = document.getElementById('searchBar');

let kits = [];

pageTitle.textContent = current.title;

fetch(`data/${current.file}`)
  .then(res => res.json())
  .then(data => {
    kits = data.kits;
    displayKits(kits);
  });

function displayKits(list) {
  kitList.innerHTML = '';

  list.forEach((kit, i) => {
    const panel = document.createElement('div');
    panel.classList.add('panel');

    panel.innerHTML = `
      <div class="text">
        <div class="line">${kit.mold}</div>
        <div class="line variant">&gt; ${kit.variant}</div>
      </div>
    `;

    panel.addEventListener('click', () => {
      window.location.href = kit.page;
    });

    kitList.appendChild(panel);

    setTimeout(() => {
      panel.style.animation = `flyIn 0.6s forwards ${i*0.1 + 0.3}s`;
    }, 50);
  });

  setTimeout(()=>{ 
    document.getElementById('pageTitle').style.opacity = 1;
    searchWrapper.style.opacity = 1;
    kitList.style.opacity = 1;
  }, 100);
}

searchBar.addEventListener('input', () => {
  const term = searchBar.value.toLowerCase();
  displayKits(kits.filter(k => 
    k.mold.toLowerCase().includes(term) ||
    k.variant.toLowerCase().includes(term)
  ));
});

setTimeout(()=>{ homeBtn.style.animation = 'flyIn 0.6s forwards 0.2s'; }, 100);

homeBtn.addEventListener('click', () => {
  kitList.style.opacity = 0;
  document.getElementById('pageTitle').style.opacity = 0;
  searchWrapper.style.opacity = 0;
  homeBtn.style.opacity = 0;
  bg.style.transform = 'translateX(0%)';

  setTimeout(()=> window.location.href='index.html',700);
});

window.addEventListener("pageshow", (event) => {
  if (event.persisted) location.reload();
});
</script>
