<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  html, body {
    margin: 0;
    height: 100%;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow: hidden;
  }

  .app { position: relative; width: 100%; height: 100vh; overflow: hidden; }

  .bg-image {
    position: absolute; inset: 0;
    background-image: url('images/rx78-bg.png');
    background-size: cover;
    background-position: top center;
    background-repeat: no-repeat;
    z-index: 0;
    transform: translateX(50%);
    transition: transform 0.7s ease;
  }

  .bg-image::after {
    content: "";
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.6);
  }

  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .hero { padding: 60px 20px 10px 20px; flex-shrink:0; }

  @media (max-width:600px){ 
    .hero{ padding: 80px 10px 10px 10px; }
  }

  #pageTitle {
    font-size: 28px;
    margin: 0 0 16px 0;
    line-height: 1.2;
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
    transform: skew(20deg);
    display: inline-block;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  #pageTitle span { transform: skew(-20deg); display: block; }

  @media (max-width:600px){
    #pageTitle { font-size: 22px; margin-bottom: 12px; }
  }

  #searchBarWrapper { margin: 0 0 8px 0; opacity:0; transition: opacity 0.6s ease; }

  #searchBar {
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 8px 10px;
    transform: skew(-20deg);
    font-size: 14px;
    color: white;
    outline: none;
    width: calc(66% - 20px);
  }

  /* ===== SCROLL AREA ===== */
  .menu-wrapper {
    display: flex;
    justify-content: center;
    width: 100%;
    flex: 1;
    overflow: hidden;
  }

  /* ✅ SCROLLBAR ALIGNED TO PANEL EDGE */
  .menu {
    width: 50%;
    max-width: 50%;
    height: 100%;
    overflow-y: auto;

    padding: 20px 10px 40px 10px;

    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 25px, black calc(100% - 60px), transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 0%, black 25px, black calc(100% - 60px), transparent 100%);

    scrollbar-color: white black;
    scrollbar-width: thin;

    transition: opacity 0.7s ease;
    opacity: 0;
  }

  .menu::-webkit-scrollbar { width: 8px; }
  .menu::-webkit-scrollbar-track { background: black; }
  .menu::-webkit-scrollbar-thumb { background: white; border-radius:4px; }

  /* ===== MOBILE ===== */
  @media (max-width:600px){
    .menu {
      width: 100%;
      max-width: 100%;
      scrollbar-width: none;
    }

    .menu::-webkit-scrollbar {
      display: none;
    }
  }

  /* PANELS */
  .panel {
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 20px 30px;
    transform: skew(-20deg) translateX(-100px);
    opacity: 0;
    margin-bottom: 20px;
    cursor: pointer;
    width: 100%;   /* ✅ fill menu width */
    box-sizing: border-box;
  }

  .panel .text {
    transform: skew(20deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .line {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: clamp(14px, 2vw, 18px);
  }

  .line.variant { margin-top: 4px; }

  @media (max-width:600px){
    .panel { 
      width: 100%;
      padding: 16px 20px; 
    }
    .line { font-size: clamp(12px, 3vw, 16px); }
  }

  /* HOME BUTTON */
  #homeBtn {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 8px 12px;
    transform: skew(-20deg) translateX(-100px);
    width: 66px;
    opacity: 0;
    cursor: pointer;
  }

  #homeBtn span {
    display: block;
    transform: skew(20deg);
    font-size: 10px;
    text-align: center;
  }

  @keyframes flyIn { 
    to { transform: skew(-20deg) translateX(0); opacity:1; } 
  }

  </style>
</head>
<body>

<div class="app">
  <div class="bg-image" id="bgImage"></div>

  <div class="content">

    <div id="homeBtn"><span>HOME</span></div>

    <div class="hero">
      <div id="pageTitle"><span></span></div>
      <div id="searchBarWrapper">
        <input type="text" id="searchBar" placeholder="Search...">
      </div>
    </div>

    <div class="menu-wrapper">
      <div class="menu" id="kitList"></div>
    </div>

  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const grade = params.get("grade") || "HG";

const gradeMap = {
  HG: { title: "HIGH GRADE", file: "hg-kits.json" },
  MG: { title: "MASTER GRADE", file: "mg-kits.json" },
  RG: { title: "REAL GRADE", file: "rg-kits.json" },
  PG: { title: "PERFECT GRADE", file: "pg-kits.json" },
  SD: { title: "SUPER DEFORMED", file: "sd-kits.json" },
  MEGASIZE: { title: "MEGA SIZE MODEL", file: "megasize-kits.json" }
};

const current = gradeMap[grade] || gradeMap["HG"];

const bg = document.getElementById('bgImage');
const kitList = document.getElementById('kitList');
const homeBtn = document.getElementById('homeBtn');
const pageTitle = document.querySelector('#pageTitle span');
const searchWrapper = document.getElementById('searchBarWrapper');
const searchBar = document.getElementById('searchBar');

let kits = [];

pageTitle.textContent = current.title;

fetch(`data/${current.file}`)
  .then(res => res.json())
  .then(data => {
    kits = data.kits;
    displayKits(kits);
  })
  .catch(err => {
    console.error(err);
    kitList.innerHTML = "<div style='color:red;padding:20px;'>Failed to load kits</div>";
  });

function displayKits(list) {
  kitList.innerHTML = '';

  list.forEach((kit, i) => {
    const panel = document.createElement('div');
    panel.classList.add('panel');

    panel.innerHTML = `
      <div class="text">
        <div class="line">${kit.mold}</div>
        <div class="line variant">&gt; ${kit.variant}</div>
      </div>
    `;

    panel.addEventListener('click', () => {
      window.location.href = kit.page;
    });

    kitList.appendChild(panel);

    setTimeout(() => {
      panel.style.animation = `flyIn 0.6s forwards ${i*0.1 + 0.3}s`;
    }, 50);
  });

  setTimeout(()=>{ 
    document.getElementById('pageTitle').style.opacity = 1;
    searchWrapper.style.opacity = 1;
    kitList.style.opacity = 1;
  }, 100);
}

searchBar.addEventListener('input', () => {
  const term = searchBar.value.toLowerCase();
  displayKits(kits.filter(k => 
    k.mold.toLowerCase().includes(term) ||
    k.variant.toLowerCase().includes(term)
  ));
});

setTimeout(()=>{ homeBtn.style.animation = 'flyIn 0.6s forwards 0.2s'; }, 100);

homeBtn.addEventListener('click', () => {
  kitList.style.opacity = 0;
  document.getElementById('pageTitle').style.opacity = 0;
  searchWrapper.style.opacity = 0;
  homeBtn.style.opacity = 0;
  bg.style.transform = 'translateX(0%)';

  setTimeout(()=>{
    window.location.href='index.html';
  },700);
});
</script>

</body>
</html>
