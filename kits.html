<!DOCTYPE html>
<html>
<head>
  <title>RX-78 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  html, body {
    margin: 0;
    height: 100%;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow: hidden;
  }

  .app { position: relative; width: 100%; height: 100vh; overflow: hidden; }

  .bg-image {
    position: absolute; inset: 0;
    background-image: url('rx78-bg.png');
    background-size: cover;
    background-position: top center;
    background-repeat: no-repeat;
    z-index: 0;
    transform: translateX(50%);
    transition: transform 0.7s ease;
  }

  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .hero { padding: 60px 20px 10px 20px; flex-shrink:0; }

  @media (max-width:600px){ 
    .hero{ padding: 80px 10px 10px 10px; }
  }

  #pageTitle {
    font-size: 28px;
    margin: 0 0 16px 0;
    transform: skew(20deg);
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  #pageTitle span {
    transform: skew(-20deg);
    display: block;
  }

  #searchBarWrapper {
    margin: 0 0 8px 0;
    opacity:0;
    transition: opacity 0.6s ease;
  }

  #searchBar {
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 8px 10px;
    transform: skew(-20deg);
    font-size: 14px;
    color: white;
    outline: none;
    width: calc(66% - 20px);
  }

  #bgActive {
  position: absolute;
  inset: 0;
  background-image: url('rx78-bg-active.png');
  background-size: cover;
  background-repeat: no-repeat;
  background-position: top center;

  /* MUST match bgImage positioning system */
  transform: translateX(50%);

  opacity: 0;
  transition: opacity 0.8s ease;
}

  .menu {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    width: calc(50% + 40px);
    padding: 20px 20px 40px 20px;

    -webkit-mask-image: linear-gradient(
      to bottom,
      transparent 0%,
      black 25px,
      black calc(100% - 60px),
      transparent 100%
    );
    mask-image: linear-gradient(
      to bottom,
      transparent 0%,
      black 25px,
      black calc(100% - 60px),
      transparent 100%
    );

    scrollbar-color: white black;
    scrollbar-width: thin;

    opacity: 0;
    transition: opacity 0.7s ease;
  }

  .menu::-webkit-scrollbar { width: 8px; }
  .menu::-webkit-scrollbar-track { background: transparent; }
  .menu::-webkit-scrollbar-thumb { background: white; border-radius:4px; }

  .panel {
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 20px 30px;
    transform: skew(-20deg) translateX(-100px);
    opacity: 0;
    margin-bottom: 20px;
    cursor: pointer;
    width: 50%;
    box-sizing: border-box;
  }

  .panel .text {
    transform: skew(20deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .line {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: clamp(14px, 2vw, 18px);
  }

  .line.variant { margin-top: 4px; }

  @media (max-width:600px){
    .menu {
      width: 100%;
      scrollbar-width: none;
    }

    .menu::-webkit-scrollbar {
      display: none;
    }

    .panel { 
      width: 60%;
      padding: 16px 20px;
    }

    .line {
      font-size: clamp(12px, 3vw, 16px);
    }
  }

  #homeBtn {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(17,17,17,0.65);
    border: 3px solid white;
    padding: 8px 12px;
    transform: skew(-20deg) translateX(-100px);
    width: 66px;
    opacity: 0;
    cursor: pointer;
  }

  #homeBtn span {
    display: block;
    transform: skew(20deg);
    font-size: 10px;
    text-align: center;
  }
    
  #fadeOut {
  position: fixed;
  inset: 0;
  background: black;
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
  transition: opacity 0.7s ease;
}

  @keyframes flyIn { 
    to { transform: skew(-20deg) translateX(0); opacity:1; } 
  }
  </style>
</head>
<body>

<div id="fadeOut"></div>

<div class="app">
  <div class="bg-image" id="bgImage"></div>
  <div class="bg-image" id="bgActive"></div>

  <div class="content">

    <div id="homeBtn"><span>HOME</span></div>

    <div class="hero">
      <div id="pageTitle"><span></span></div>
      <div id="searchBarWrapper">
        <input type="text" id="searchBar" placeholder="Search...">
      </div>
    </div>

    <div class="menu" id="kitList"></div>

  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const grade = params.get("grade");
const bgActive = document.getElementById("bgActive");

// ✅ REDIRECT IF INVALID OR MISSING
const gradeMap = {
  HG: { title: "HIGH GRADE & 1/144 SCALE", file: "hg-kits.json" },
  MG: { title: "MASTER GRADE & 1/100 SCALE", file: "mg-kits.json" },
  RG: { title: "REAL GRADE", file: "rg-kits.json" },
  PG: { title: "PERFECT GRADE", file: "pg-kits.json" },
  SD: { title: "SUPER DEFORMED & GASHAPON", file: "sd-kits.json" },
  MEGASIZE: { title: "MEGA SIZE MODEL", file: "megasize-kits.json" },
  MISC: { title: "MISCELLANEOUS", file: "misc-kits.json" },
  CUSTOM: { title: "CUSTOMS", file: "custom-kits.json" },
  BACKLOG: { title: "BACKLOG", file: "all" }
};

if (!grade || !gradeMap[grade]) {
  window.location.href = "index.html";
}

const current = gradeMap[grade];

const bg = document.getElementById('bgImage');
const kitList = document.getElementById('kitList');
const homeBtn = document.getElementById('homeBtn');
const pageTitle = document.querySelector('#pageTitle span');
const searchWrapper = document.getElementById('searchBarWrapper');
const searchBar = document.getElementById('searchBar');

let kits = [];

pageTitle.textContent = current.title;

if (current.file === "all") {
  Promise.all([
    fetch("data/hg-kits.json").then(r => r.json()),
    fetch("data/mg-kits.json").then(r => r.json()),
    fetch("data/rg-kits.json").then(r => r.json()),
    fetch("data/pg-kits.json").then(r => r.json()),
    fetch("data/sd-kits.json").then(r => r.json()),
    fetch("data/megasize-kits.json").then(r => r.json())
  ]).then(results => {
    kits = results.flatMap(r => r.kits);

    kits = kits.filter(k => (k.status || "built") === "backlog");

    displayKits(kits);
  });

} else {
  fetch(`data/${current.file}`)
  .then(res => res.json())
  .then(data => {

    // ✅ ONLY BUILT KITS
    kits = data.kits.filter(k => (k.status || "built") === "built");

    // ✅ SORT
    kits.sort((a, b) => {
      const moldCompare = (a.mold || "").localeCompare(b.mold || "");
      if (moldCompare !== 0) return moldCompare;

      return (a.variant || "").localeCompare(b.variant || "");
    });

    displayKits(kits);
  });
}
  

function displayKits(list) {
  kitList.innerHTML = '';

  list.forEach((kit, i) => {
    const panel = document.createElement('div');
    panel.classList.add('panel');

    panel.innerHTML = `
      <div class="text">
        <div class="line">${kit.mold}</div>
        <div class="line variant">&gt; ${kit.variant}</div>
      </div>
    `;

    panel.addEventListener('click', () => {
  const fade = document.getElementById('fadeOut');

  // trigger fade
  fade.style.opacity = "1";
  bgActive.style.opacity = "1";

  setTimeout(() => {
    window.location.href = `detail.html?grade=${grade}&id=${kit.id}`;
  }, 2000);
});

    kitList.appendChild(panel);

    setTimeout(() => {
      panel.style.animation = `flyIn 0.6s forwards ${i*0.1 + 0.3}s`;
    }, 50);
  });

  setTimeout(()=>{ 
    document.getElementById('pageTitle').style.opacity = 1;
    searchWrapper.style.opacity = 1;
    kitList.style.opacity = 1;
  }, 100);
}

searchBar.addEventListener('input', () => {
  const term = searchBar.value.toLowerCase();
  displayKits(kits.filter(k => 
    k.mold.toLowerCase().includes(term) ||
    k.variant.toLowerCase().includes(term)
  ));
});

setTimeout(()=>{ homeBtn.style.animation = 'flyIn 0.6s forwards 0.2s'; }, 100);

homeBtn.addEventListener('click', () => {
  kitList.style.opacity = 0;
  document.getElementById('pageTitle').style.opacity = 0;
  searchWrapper.style.opacity = 0;
  homeBtn.style.opacity = 0;
  bg.style.transform = 'translateX(0%)';
  setTimeout(()=> window.location.href='index.html',700);
});

</script>

</body>
</html>
